name: Sync Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - 'config/**'
      - 'hack/charts/**'
      - '.github/workflows/sync-helm-chart.yml'
  workflow_dispatch:

# Requires repository secret HELM_CHARTS_TOKEN with write access to bubustack/helm-charts.
env:
  CHART_NAME: bobrapet
  HELM_CHARTS_REPO: bubustack/helm-charts
  HELMIFY_VERSION: v0.4.19

jobs:
  sync:
    name: Generate & PR chart updates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
          cache-dependency-path: go.sum

      - name: Build Helm chart artifacts
        run: make helm-chart CHART=${{ env.CHART_NAME }}

      - name: Checkout helm-charts repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.HELM_CHARTS_REPO }}
          token: ${{ secrets.HELM_CHARTS_TOKEN }}
          path: helm-charts
          fetch-depth: 0

      - name: Update chart contents
        run: |
          mkdir -p helm-charts/charts
          rm -rf helm-charts/charts/${CHART_NAME}
          cp -R dist/charts/${CHART_NAME} helm-charts/charts/${CHART_NAME}

      - name: Detect chart changes
        id: changes
        run: |
          cd helm-charts
          if git status --porcelain | grep . >/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request in helm-charts
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          path: helm-charts
          token: ${{ secrets.HELM_CHARTS_TOKEN }}
          commit-message: 'chore: sync ${{ env.CHART_NAME }} Helm chart'
          branch: chore/sync-${{ env.CHART_NAME }}-chart-${{ github.sha }}
          title: 'chore: sync ${{ env.CHART_NAME }} Helm chart'
          body: |
            Automated chart sync from `${{ github.repository }}`@`${{ github.sha }}`.

            - Source repo: `${{ github.repository }}`
            - Source commit: `${{ github.sha }}`
            - Generated via helmify `${{ env.HELMIFY_VERSION }}`
          labels: |
            automation
            charts

      - name: No changes detected
        if: steps.changes.outputs.changed != 'true'
        run: echo "Helm chart already up-to-date." >> "$GITHUB_STEP_SUMMARY"

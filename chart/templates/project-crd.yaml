apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: projects.bubu.sh
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  labels:
  {{- include "chart.labels" . | nindent 4 }}
spec:
  group: bubu.sh
  names:
    kind: Project
    listKind: ProjectList
    plural: projects
    singular: project
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Project is the Schema for the projects API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProjectSpec defines the desired state of Project.
            properties:
              disableGateway:
                description: DisableGateway indicates whether to skip gateway creation
                  entirely
                type: boolean
              gateway:
                description: |-
                  Gateway defines the configuration for the Istio Gateway
                  Ignored if DisableGateway is true
                properties:
                  name:
                    description: Name of the gateway. If not specified, defaults to
                      <project-name>-gateway
                    type: string
                  selector:
                    additionalProperties:
                      type: string
                    description: |-
                      Selector is a map of labels to select the gateway deployment
                      If not specified, defaults to {"istio": "ingressgateway"}
                    type: object
                  servers:
                    description: |-
                      Servers is a list of server configurations for the gateway
                      If not specified, defaults to a single HTTP server on port 80
                    items:
                      description: ServerSpec defines the configuration for a Gateway
                        server
                      properties:
                        hosts:
                          description: Hosts is a list of hosts exposed by this gateway
                            server
                          items:
                            type: string
                          type: array
                        port:
                          description: Port defines the port configuration
                          properties:
                            name:
                              description: Name is the name of the port
                              type: string
                            number:
                              description: Number is the port number
                              format: int32
                              type: integer
                            protocol:
                              description: Protocol is the protocol used by the port
                                (HTTP|HTTPS|GRPC|...)
                              type: string
                          required:
                          - name
                          - number
                          - protocol
                          type: object
                        tls:
                          description: TLS defines TLS configuration for the server
                          properties:
                            cipherSuites:
                              description: CipherSuites is a list of TLS cipher suites
                                to support
                              items:
                                type: string
                              type: array
                            credentialName:
                              description: CredentialName is the name of the Kubernetes
                                secret containing TLS certs
                              type: string
                            httpsRedirect:
                              description: HTTPSRedirect specifies whether to redirect
                                HTTP requests to HTTPS
                              type: boolean
                            minProtocolVersion:
                              description: MinProtocolVersion is the minimum TLS protocol
                                version
                              type: string
                            mode:
                              description: Mode is the TLS mode (SIMPLE|MUTUAL|PASSTHROUGH|...)
                              type: string
                          required:
                          - mode
                          type: object
                      required:
                      - port
                      type: object
                    type: array
                type: object
              transports:
                description: Transports specifies the list of transports to be created
                items:
                  description: TransportSpec defines a transport to be created for the
                    project
                  properties:
                    kind:
                      description: Kind of the transport resource
                      type: string
                    name:
                      description: Name of the transport resource
                      type: string
                  required:
                  - kind
                  - name
                  type: object
                type: array
            type: object
          status:
            description: ProjectStatus defines the observed state of Project.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the project's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: []
  storedVersions: []

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chart.fullname" . }}-project-viewer-role
  labels:
  {{- include "chart.labels" . | nindent 4 }}
rules:
- apiGroups:
  - bubu.sh
  resources:
  - projects
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - bubu.sh
  resources:
  - projects/status
  verbs:
  - get

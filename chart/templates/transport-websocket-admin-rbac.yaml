apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chart.fullname" . }}-transport-websocket-admin-role
  labels:
  {{- include "chart.labels" . | nindent 4 }}
rules:
- apiGroups:
  - transport.bubu.sh
  resources:
  - websockets
  verbs:
  - '*'
- apiGroups:
  - transport.bubu.sh
  resources:
  - websockets/status
  verbs:
  - get

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: impulses.bubu.sh
spec:
  group: bubu.sh
  names:
    kind: Impulse
    listKind: ImpulseList
    plural: impulses
    shortNames:
    - imp
    singular: impulse
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              configSchema:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              contextMapping:
                description: Optional mapping from trigger context to story inputs
                type: object
                x-kubernetes-preserve-unknown-fields: true
              contextSchema:
                description: Schema definitions (optional, for validation and tooling)
                type: object
                x-kubernetes-preserve-unknown-fields: true
              engine:
                description: Execution engine configuration - how to run this impulse
                  (optional; may default from template)
                properties:
                  imagePullPolicy:
                    description: Image pull policy for the container image
                    enum:
                    - Always
                    - Never
                    - IfNotPresent
                    type: string
                  mode:
                    default: job
                    description: |-
                      Execution mode: job (one-shot), deployment (stateless), statefulset (stateful)
                      Note: Engrams support all modes, Impulses support only deployment/statefulset (validated at template level)
                    enum:
                    - job
                    - deployment
                    - statefulset
                    type: string
                  templateRef:
                    description: Reference to Template that defines the image and
                      defaults
                    type: string
                  workload:
                    description: Workload configuration for deployment/statefulset/job
                      modes
                    properties:
                      activeDeadlineSeconds:
                        description: Lifecycle management
                        format: int64
                        type: integer
                      completions:
                        format: int32
                        type: integer
                      job:
                        description: Job-specific configuration
                        properties:
                          backoffLimit:
                            description: Number of retries before considering job
                              failed
                            format: int32
                            type: integer
                          completionMode:
                            description: 'How job completion is tracked: NonIndexed
                              or Indexed'
                            type: string
                          suspend:
                            description: Whether job should be suspended (not create
                              pods)
                            type: boolean
                        type: object
                      parallelism:
                        format: int32
                        type: integer
                      replicas:
                        description: Scaling configuration
                        format: int32
                        type: integer
                      statefulSet:
                        description: StatefulSet-specific configuration
                        properties:
                          podManagementPolicy:
                            description: 'Pod management policy: OrderedReady (default)
                              or Parallel'
                            type: string
                          serviceName:
                            description: Name of service governing this StatefulSet
                              (required for StatefulSet)
                            type: string
                          volumeClaimTemplates:
                            description: Volume claim templates for persistent storage
                            items:
                              description: VolumeClaimTemplate defines a template
                                for persistent volume claims
                              properties:
                                accessModes:
                                  items:
                                    type: string
                                  type: array
                                name:
                                  type: string
                                size:
                                  type: string
                                storageClass:
                                  type: string
                              required:
                              - name
                              - size
                              type: object
                            type: array
                        required:
                        - serviceName
                        type: object
                      ttlSecondsAfterFinished:
                        format: int32
                        type: integer
                      updateStrategy:
                        description: Update strategy for Deployment/StatefulSet
                        properties:
                          rollingUpdate:
                            description: Rolling update configuration
                            properties:
                              maxSurge:
                                description: |-
                                  Max number of pods that can be created above desired replicas during update
                                  Only for Deployment (not StatefulSet)
                                type: string
                              maxUnavailable:
                                description: |-
                                  Max number of pods that can be unavailable during update
                                  Can be absolute number (ex: 5) or percentage (ex: 25%)
                                type: string
                            type: object
                          type:
                            description: 'Type of update: RollingUpdate or Recreate
                              (Deployment), RollingUpdate or OnDelete (StatefulSet)'
                            type: string
                        type: object
                    type: object
                type: object
              mappingSchema:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              resources:
                description: Resource requirements
                properties:
                  limits:
                    description: ResourceLimits defines maximum allowed resources
                    properties:
                      cpu:
                        type: string
                      ephemeralStorage:
                        type: string
                      gpu:
                        type: string
                      maxArtifactSize:
                        type: string
                      maxFileSize:
                        description: Additional limits
                        type: string
                      maxNetworkConns:
                        format: int32
                        type: integer
                      memory:
                        type: string
                    type: object
                  maxConcurrentInstances:
                    description: Execution constraints
                    format: int32
                    type: integer
                  maxExecutionTime:
                    type: string
                  maxRetries:
                    format: int32
                    type: integer
                  nodeSelector:
                    additionalProperties:
                      type: string
                    description: Scheduling constraints
                    type: object
                  requests:
                    description: Resource requests and limits
                    properties:
                      cpu:
                        type: string
                      ephemeralStorage:
                        type: string
                      gpu:
                        type: string
                      memory:
                        type: string
                    type: object
                  tolerations:
                    items:
                      type: string
                    type: array
                type: object
              retry:
                description: Retry and timeout policies
                properties:
                  backoff:
                    type: string
                  baseDelay:
                    type: string
                  maxDelay:
                    type: string
                  maxRetries:
                    type: integer
                type: object
              security:
                description: Security configuration
                properties:
                  allowPrivilegeEscalation:
                    type: boolean
                  networkPolicy:
                    type: string
                  requiredSecrets:
                    items:
                      type: string
                    type: array
                  runAsNonRoot:
                    type: boolean
                type: object
              storyRef:
                description: Core impulse behavior - trigger a story; StoryRef may
                  be "ns/name" for cross-namespace
                type: string
              timeout:
                type: string
              with:
                description: Configuration/parameters for this Impulse instance (validated
                  by the template/schema)
                type: object
                x-kubernetes-preserve-unknown-fields: true
            required:
            - storyRef
            type: object
            x-kubernetes-validations:
            - message: storyRef is required
              rule: size(self.storyRef) > 0
            - message: engine.templateRef is required when engine is set
              rule: '!has(self.engine) || size(self.engine.templateRef) > 0'
            - message: storyRef must be valid name or ns/name format
              rule: self.storyRef.matches('^([a-z0-9]([-a-z0-9]*[a-z0-9])?/)?[a-z0-9]([-a-z0-9]*[a-z0-9])?$')
            - message: storyRef must be <= 253 characters
              rule: size(self.storyRef) <= 253
          status:
            description: |-
              All shared types (EngineConfig, RetryPolicy, WorkloadResources, WorkloadSecurity, etc.)
              are defined in workload_types.go to ensure consistency between Engrams and Impulses
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

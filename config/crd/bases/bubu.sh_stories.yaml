---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: stories.bubu.sh
spec:
  group: bubu.sh
  names:
    kind: Story
    listKind: StoryList
    plural: stories
    shortNames:
    - story
    singular: story
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.stepsCount
      name: Steps
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Enforce policy.concurrency at the spec level to avoid cross-struct
              references
            properties:
              inputsSchema:
                description: Optional JSON schema strings for inputs/outputs (opaque
                  for MVP)
                type: string
              outputSchema:
                type: string
              policy:
                description: Simple policy placeholder (MVP)
                properties:
                  artifacts:
                    description: Artifact store policy and TTL
                    properties:
                      maxInlineSize:
                        description: Max inline size for outputs kept in status (e.g.,
                          "256Ki")
                        type: string
                      store:
                        description: Store name or class (e.g., s3, minio, gcs)
                        type: string
                      ttl:
                        description: Time-to-live for artifacts (e.g., "24h")
                        type: string
                    type: object
                  concurrency:
                    description: Story-level concurrency cap (max in-flight steps)
                    format: int32
                    type: integer
                  dlq:
                    description: Dead-letter handling target (e.g., step name or sink
                      ref)
                    type: string
                  idempotency:
                    description: Enable effectively-once semantics when possible
                    type: boolean
                  retries:
                    properties:
                      backoff:
                        default: exponential
                        enum:
                        - exponential
                        - linear
                        - fixed
                        type: string
                      baseDelay:
                        default: 2s
                        pattern: ^[0-9]+(\.[0-9]+)?(ns|us|µs|ms|s|m|h)$
                        type: string
                      maxDelay:
                        default: 1m
                        pattern: ^[0-9]+(\.[0-9]+)?(ns|us|µs|ms|s|m|h)$
                        type: string
                      maxRetries:
                        default: 3
                        maximum: 100
                        minimum: 0
                        type: integer
                    type: object
                  shortCircuit:
                    description: ShortCircuit controls early termination behavior
                    properties:
                      action:
                        default: cancelInFlight
                        type: string
                      "on":
                        default:
                        - return
                        - fail
                        items:
                          type: string
                        type: array
                    type: object
                  timeouts:
                    properties:
                      step:
                        default: 5m
                        type: string
                      story:
                        default: 30m
                        type: string
                    type: object
                type: object
              steps:
                description: 'Minimal step list: either a built-in Type or a Ref (image)'
                items:
                  properties:
                    batchTimeout:
                      type: string
                    body:
                      x-kubernetes-preserve-unknown-fields: true
                    branchPolicy:
                      description: Policies
                      properties:
                        action:
                          default: cancelSiblings
                          type: string
                        "on":
                          default:
                          - return
                          - fail
                          items:
                            type: string
                          type: array
                      type: object
                    branches:
                      x-kubernetes-preserve-unknown-fields: true
                    burst:
                      type: integer
                    cases:
                      description: Switch specific (multi-way branching)
                      items:
                        description: SwitchCase represents a case in a switch statement
                        properties:
                          steps:
                            x-kubernetes-preserve-unknown-fields: true
                          when:
                            type: string
                        required:
                        - steps
                        - when
                        type: object
                      type: array
                    condition:
                      type: string
                    continueOnError:
                      description: Continue on error (GitHub Actions inspiration)
                      type: boolean
                    default:
                      x-kubernetes-preserve-unknown-fields: true
                    duration:
                      type: string
                    else:
                      x-kubernetes-preserve-unknown-fields: true
                    event:
                      description: Wait specific
                      type: string
                    filter:
                      description: Filter/Transform specific
                      type: string
                    gate:
                      description: Gate specific
                      properties:
                        approvers:
                          items:
                            type: string
                          type: array
                        sla:
                          type: string
                      type: object
                    id:
                      type: string
                    if:
                      description: Control flow with nested structures (natural workflow
                        definition)
                      type: string
                    items:
                      type: string
                    maxConcurrency:
                      description: Parallel execution hints
                      format: int32
                      type: integer
                    maxWait:
                      type: string
                    mode:
                      description: Stop specific
                      type: string
                    name:
                      type: string
                    needs:
                      description: Dependencies (GitHub Actions needs)
                      items:
                        type: string
                      type: array
                    output:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    pausePolicy:
                      description: Pause/Resume control
                      properties:
                        condition:
                          description: CEL expression for conditional pausing (when
                            trigger=onCondition)
                          type: string
                        externalTrigger:
                          description: External trigger configuration (when resumeMode=external)
                          properties:
                            config:
                              description: Configuration passed to the external trigger
                                engram
                              type: object
                              x-kubernetes-preserve-unknown-fields: true
                            engramRef:
                              description: Reference to an Engram that handles the
                                external trigger
                              type: string
                          required:
                          - engramRef
                          type: object
                        resumeMode:
                          default: manual
                          description: 'How to resume: manual, timeout, or external
                            trigger'
                          enum:
                          - manual
                          - timeout
                          - external
                          type: string
                        resumeTimeout:
                          description: Timeout for automatic resume (when resumeMode=timeout)
                          type: string
                        trigger:
                          default: onFailure
                          enum:
                          - onFailure
                          - onCondition
                          - manual
                          type: string
                      type: object
                    rate:
                      description: Throttle specific
                      type: string
                    ref:
                      type: string
                    retry:
                      description: Step-level policies (override Story defaults)
                      properties:
                        backoff:
                          default: exponential
                          enum:
                          - exponential
                          - linear
                          - fixed
                          type: string
                        baseDelay:
                          default: 2s
                          pattern: ^[0-9]+(\.[0-9]+)?(ns|us|µs|ms|s|m|h)$
                          type: string
                        maxDelay:
                          default: 1m
                          pattern: ^[0-9]+(\.[0-9]+)?(ns|us|µs|ms|s|m|h)$
                          type: string
                        maxRetries:
                          default: 3
                          maximum: 100
                          minimum: 0
                          type: integer
                      type: object
                    size:
                      description: Batch specific
                      type: integer
                    storyRef:
                      description: Sub-workflow execution
                      type: string
                    subInputs:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    then:
                      x-kubernetes-preserve-unknown-fields: true
                    timeout:
                      type: string
                    transform:
                      type: string
                    type:
                      description: Exactly one of Type or Ref must be set
                      enum:
                      - condition
                      - loop
                      - parallel
                      - sleep
                      - stop
                      - switch
                      - filter
                      - transform
                      - wait
                      - throttle
                      - batch
                      - executeStory
                      - gate
                      - setData
                      - mergeData
                      type: string
                    window:
                      type: string
                    with:
                      description: Generic step configuration
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: Exactly one of type or ref must be set
                    rule: (has(self.type) && size(self.type) > 0) != (has(self.ref)
                      && size(self.ref) > 0)
                type: array
            required:
            - steps
            type: object
            x-kubernetes-validations:
            - message: policy.concurrency must be 1-1000
              rule: '!has(self.policy) || !has(self.policy.concurrency) || (self.policy.concurrency
                >= 1 && self.policy.concurrency <= 1000)'
            - message: policy.timeouts.story must be valid duration
              rule: '!has(self.policy) || !has(self.policy.timeouts) || !has(self.policy.timeouts.story)
                || self.policy.timeouts.story.matches(''^[0-9]+(\\.[0-9]+)?(ns|us|µs|ms|s|m|h)$'')'
            - message: policy.timeouts.step must be valid duration
              rule: '!has(self.policy) || !has(self.policy.timeouts) || !has(self.policy.timeouts.step)
                || self.policy.timeouts.step.matches(''^[0-9]+(\\.[0-9]+)?(ns|us|µs|ms|s|m|h)$'')'
          status:
            properties:
              compiledAt:
                description: Compilation results
                format: date-time
                type: string
              compiledSteps:
                type: integer
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              stepsCount:
                description: Derived count for UX (moved from spec)
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

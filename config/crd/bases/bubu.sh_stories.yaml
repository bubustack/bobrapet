---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: stories.bubu.sh
spec:
  group: bubu.sh
  names:
    categories:
    - bubu
    - ai
    - workflows
    kind: Story
    listKind: StoryList
    plural: stories
    shortNames:
    - story
    singular: story
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.stepsTotal
      name: Steps
      type: integer
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Story represents a workflow definition - a sequence of steps that accomplish a business goal

          Stories are the main workflows in your system. Think of them like:
          - GitHub Actions workflows
          - Jenkins pipelines
          - Zapier automations
          - Any business process you want to automate

          Stories orchestrate Engrams (the workers) to create powerful workflows:
          - CI/CD pipeline: checkout → test → build → deploy
          - Data processing: extract → transform → load → notify
          - E-commerce: validate order → charge payment → ship → update inventory
          - Content moderation: analyze → classify → approve/reject → notify
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: StorySpec defines what the workflow does and how it should
              run
            properties:
              inputsSchema:
                description: |-
                  What inputs does this Story expect?
                  Define the data structure that triggers (Impulses) or users need to provide
                  Example: {"repository": "string", "branch": "string", "commit": "string"}
                type: object
                x-kubernetes-preserve-unknown-fields: true
              outputSchema:
                description: |-
                  What outputs does this Story produce?
                  Define the data structure this workflow will return upon completion
                  Example: {"buildArtifact": "string", "testResults": "object", "deploymentUrl": "string"}
                type: object
                x-kubernetes-preserve-unknown-fields: true
              pattern:
                default: batch
                description: |-
                  Pattern defines the execution strategy for this Story.
                  'batch' (default): Runs the story as a series of ephemeral jobs. Good for asynchronous tasks.
                  'streaming': Deploys the story as a persistent pipeline of services for real-time, low-latency workloads.
                enum:
                - batch
                - streaming
                type: string
              policy:
                description: How should this Story behave? (timeouts, retries, storage,
                  etc.)
                properties:
                  concurrency:
                    description: Concurrency limits
                    format: int32
                    type: integer
                  execution:
                    description: Default execution settings (can be overridden at
                      step level)
                    properties:
                      job:
                        description: Job configuration
                        properties:
                          backoffLimit:
                            description: Backoff limit for jobs
                            format: int32
                            type: integer
                          restartPolicy:
                            description: Restart policy
                            type: string
                          ttlSecondsAfterFinished:
                            description: TTL for job cleanup
                            format: int32
                            type: integer
                        type: object
                      resources:
                        description: Resource configuration (actual values, not defaults)
                        properties:
                          cpuLimit:
                            description: CPU limit
                            type: string
                          cpuRequest:
                            description: CPU request
                            type: string
                          memoryLimit:
                            description: Memory limit
                            type: string
                          memoryRequest:
                            description: Memory request
                            type: string
                        type: object
                      retry:
                        description: Retry configuration
                        properties:
                          backoff:
                            description: |-
                              Backoff strategy for retry delays
                              - exponential: 1s, 2s, 4s, 8s... (doubles each time)
                              - linear: 1s, 2s, 3s, 4s... (increases by delay each time)
                              - constant: 1s, 1s, 1s, 1s... (same delay each time)
                            enum:
                            - exponential
                            - linear
                            - constant
                            type: string
                          delay:
                            default: 1s
                            description: |-
                              Base delay between retries
                              Examples: "1s", "5s", "30s"
                            type: string
                          maxRetries:
                            default: 3
                            description: Maximum number of retry attempts
                            format: int32
                            maximum: 10
                            minimum: 0
                            type: integer
                        type: object
                      security:
                        description: Security configuration
                        properties:
                          allowPrivilegeEscalation:
                            description: Whether to allow privilege escalation
                            type: boolean
                          readOnlyRootFilesystem:
                            description: Read-only root filesystem
                            type: boolean
                          runAsNonRoot:
                            description: Whether to run as non-root user
                            type: boolean
                          runAsUser:
                            description: User ID to run as
                            format: int64
                            type: integer
                        type: object
                      serviceAccountName:
                        description: ServiceAccount to use for workloads created from
                          this policy.
                        type: string
                      timeout:
                        description: Timeout configuration
                        type: string
                    type: object
                  retries:
                    description: Retry behavior
                    properties:
                      continueOnStepFailure:
                        description: Whether to continue story on step failure
                        type: boolean
                      stepRetryPolicy:
                        description: Default retry policy for steps
                        properties:
                          backoff:
                            description: |-
                              Backoff strategy for retry delays
                              - exponential: 1s, 2s, 4s, 8s... (doubles each time)
                              - linear: 1s, 2s, 3s, 4s... (increases by delay each time)
                              - constant: 1s, 1s, 1s, 1s... (same delay each time)
                            enum:
                            - exponential
                            - linear
                            - constant
                            type: string
                          delay:
                            default: 1s
                            description: |-
                              Base delay between retries
                              Examples: "1s", "5s", "30s"
                            type: string
                          maxRetries:
                            default: 3
                            description: Maximum number of retry attempts
                            format: int32
                            maximum: 10
                            minimum: 0
                            type: integer
                        type: object
                    type: object
                  storage:
                    description: Storage configuration
                    properties:
                      s3:
                        description: S3 specifies the configuration for an S3-compatible
                          object store.
                        properties:
                          authentication:
                            description: Authentication configures how the workload
                              authenticates with S3.
                            properties:
                              secretRef:
                                description: |-
                                  SecretRef references a Kubernetes Secret that contains the credentials.
                                  The secret must contain keys 'accessKeyID' and 'secretAccessKey'.
                                properties:
                                  name:
                                    default: ""
                                    description: |-
                                      Name of the referent.
                                      This field is effectively required, but due to backwards compatibility is
                                      allowed to be empty. Instances of this type with an empty value here are
                                      almost certainly wrong.
                                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                    type: string
                                type: object
                                x-kubernetes-map-type: atomic
                              serviceAccountAnnotations:
                                additionalProperties:
                                  type: string
                                description: |-
                                  ServiceAccountAnnotations allows specifying annotations to be added to the
                                  auto-generated ServiceAccount. This is the recommended approach for
                                  IAM-based authentication on cloud providers (e.g., IRSA on EKS).
                                  The key-value pairs will be added to the ServiceAccount's metadata.annotations.
                                type: object
                            type: object
                          bucket:
                            description: Bucket is the name of the S3 bucket.
                            type: string
                          endpoint:
                            description: Endpoint is the S3 endpoint URL. Useful for
                              S3-compatible stores like MinIO.
                            type: string
                          region:
                            description: Region is the AWS region of the bucket.
                            type: string
                        required:
                        - authentication
                        - bucket
                        type: object
                    type: object
                  timeouts:
                    description: Timeouts
                    properties:
                      step:
                        description: Default timeout for individual steps
                        type: string
                      story:
                        description: Total time for the entire story
                        type: string
                    type: object
                type: object
              steps:
                description: |-
                  The actual workflow steps - this is where the magic happens!
                  Steps run in sequence unless you use parallel/condition logic
                items:
                  description: |-
                    Step represents a single action in a story
                    Steps are the building blocks of stories - each step does one specific thing
                  properties:
                    execution:
                      description: |-
                        Override execution settings for this specific step
                        Use sparingly - most configuration should be at the story or engram level
                      properties:
                        imagePullPolicy:
                          description: Image pull policy override
                          type: string
                        retry:
                          description: Retry policy override
                          properties:
                            backoff:
                              description: |-
                                Backoff strategy for retry delays
                                - exponential: 1s, 2s, 4s, 8s... (doubles each time)
                                - linear: 1s, 2s, 3s, 4s... (increases by delay each time)
                                - constant: 1s, 1s, 1s, 1s... (same delay each time)
                              enum:
                              - exponential
                              - linear
                              - constant
                              type: string
                            delay:
                              default: 1s
                              description: |-
                                Base delay between retries
                                Examples: "1s", "5s", "30s"
                              type: string
                            maxRetries:
                              default: 3
                              description: Maximum number of retry attempts
                              format: int32
                              maximum: 10
                              minimum: 0
                              type: integer
                          type: object
                        security:
                          description: Security context override
                          properties:
                            allowPrivilegeEscalation:
                              description: Whether to allow privilege escalation
                              type: boolean
                            readOnlyRootFilesystem:
                              description: Read-only root filesystem
                              type: boolean
                            requiredSecrets:
                              description: Required secrets for this workload
                              items:
                                type: string
                              type: array
                            runAsNonRoot:
                              description: Whether to run as non-root user
                              type: boolean
                            runAsUser:
                              description: User ID to run as
                              format: int64
                              type: integer
                          type: object
                        serviceAccountName:
                          description: ServiceAccount to use for the workload.
                          type: string
                        timeout:
                          description: Timeout for execution
                          type: string
                      type: object
                    id:
                      description: |-
                        Optional unique identifier for referencing this step's outputs
                        Useful for complex stories where later steps need data from specific earlier steps
                      maxLength: 63
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    if:
                      description: |-
                        When should this step run? (CEL expression)
                        Examples: "inputs.environment == 'production'", "steps.validate.outputs.success == true"
                      type: string
                    name:
                      description: |-
                        Human-readable name for this step
                        Examples: "fetch-data", "process-payment", "send-notification"
                      maxLength: 63
                      minLength: 1
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    ref:
                      description: |-
                        Reference to an Engram for custom logic (alternative to Type)
                        Use this when you need functionality that's not covered by built-in types
                      properties:
                        name:
                          description: |-
                            Name of the referenced object.
                            Must be a valid DNS-1123 label as defined by Kubernetes naming conventions.
                          maxLength: 253
                          minLength: 1
                          pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                          type: string
                        namespace:
                          description: |-
                            Namespace of the referenced object.
                            If empty, defaults to same namespace as the referencing object.

                            Cross-namespace references should be used carefully and only when
                            multi-tenancy is properly configured. Consider the security implications:
                            - Ensure RBAC policies allow cross-namespace access
                            - Validate that the target namespace is trusted
                            - Monitor cross-namespace references for security compliance
                          maxLength: 63
                          pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                          type: string
                        uid:
                          description: |-
                            UID is a type that holds unique ID values, including UUIDs.  Because we
                            don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                            intent and helps make sure that UIDs and names do not get conflated.
                          type: string
                      required:
                      - name
                      type: object
                    secrets:
                      additionalProperties:
                        type: string
                      description: |-
                        Maps template secret definitions to actual Kubernetes secrets for this step
                        Example: {"apiKey": "openai-credentials", "database": "postgres-creds"}
                      type: object
                    storyRef:
                      description: |-
                        Launch another story as a sub-story (using same 'with' pattern for arguments)
                        Useful for breaking complex stories into smaller, reusable pieces
                      maxLength: 253
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?/)?[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    type:
                      description: |-
                        What type of action should this step perform?
                        Use built-in types for common patterns, or reference an Engram for custom logic

                        Built-in primitive types:
                        - condition: if/then/else logic
                        - loop: iterate over arrays or repeat N times
                        - parallel: run multiple steps simultaneously
                        - sleep: wait for a specified duration
                        - stop: halt story execution (success or failure)
                        - switch: multi-way branching like switch/case
                        - filter: filter arrays or objects based on conditions
                        - transform: modify data structure or format
                        - wait: wait for external conditions or events
                        - throttle: rate limiting and flow control
                        - batch: group operations for efficiency
                        - executeStory: run another story as a sub-story
                        - setData: set variables or update context
                        - mergeData: combine data from multiple sources
                      enum:
                      - condition
                      - loop
                      - parallel
                      - sleep
                      - stop
                      - switch
                      - filter
                      - transform
                      - wait
                      - throttle
                      - batch
                      - executeStory
                      - setData
                      - mergeData
                      - gate
                      type: string
                    with:
                      description: |-
                        How to configure this step (works for both built-in types and Engrams)
                        The structure depends on what Type or Ref you're using
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                  - name
                  type: object
                maxItems: 100
                minItems: 1
                type: array
            required:
            - steps
            type: object
          status:
            properties:
              conditions:
                description: |-
                  Standard Kubernetes conditions for detailed status tracking (e.g., "Ready", "Validated")
                  This will indicate if the Story's syntax is valid and all referenced Engrams exist.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: |-
                  observedGeneration is the most recent generation observed for this Story. It corresponds to the
                  Story's generation, which is updated on mutation by the API Server.
                format: int64
                type: integer
              stepsTotal:
                description: |-
                  StepsTotal reflects the total number of steps defined in the story's specification.
                  This provides a quick way to understand the complexity of the story.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: impulses.bubustack.io
spec:
  group: bubustack.io
  names:
    categories:
    - bubu
    - ai
    kind: Impulse
    listKind: ImpulseList
    plural: impulses
    shortNames:
    - imp
    singular: impulse
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.templateRef.name
      name: Template
      type: string
    - jsonPath: .spec.storyRef.name
      name: Story
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.triggersReceived
      name: Triggers
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Impulse defines an always-on trigger that listens for external events and
          launches Stories in response.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ImpulseSpec describes a trigger instance and the Story it
              activates.
            properties:
              execution:
                description: Execution provides instance-level execution overrides.
                properties:
                  automountServiceAccountToken:
                    default: true
                    description: AutomountServiceAccountToken toggles automountServiceAccountToken
                      on the pod spec.
                    type: boolean
                  debug:
                    description: Debug enables verbose, component-level logging when
                      true.
                    type: boolean
                  imagePullPolicy:
                    description: ImagePullPolicy overrides the container pull policy.
                    type: string
                  loop:
                    description: Loop tunes fan-out semantics for loop primitives.
                    properties:
                      defaultBatchSize:
                        description: DefaultBatchSize controls how many iterations
                          are launched per reconcile.
                        format: int32
                        type: integer
                      maxBatchSize:
                        description: MaxBatchSize bounds the controller-driven batch
                          size.
                        format: int32
                        type: integer
                      maxConcurrency:
                        description: MaxConcurrency limits in-flight loop iterations.
                        format: int32
                        type: integer
                      maxConcurrencyLimit:
                        description: MaxConcurrencyLimit caps MaxConcurrency even
                          when higher values are requested.
                        format: int32
                        type: integer
                    type: object
                  maxInlineSize:
                    description: MaxInlineSize overrides the inline payload threshold
                      in bytes. Set to 0 to always offload.
                    type: integer
                  probes:
                    description: |-
                      Probes allows disabling template-defined probes; probe definitions themselves
                      remain owned by the template.
                    properties:
                      disableLiveness:
                        description: DisableLiveness disables the liveness probe when
                          true.
                        type: boolean
                      disableReadiness:
                        description: DisableReadiness disables the readiness probe
                          when true.
                        type: boolean
                      disableStartup:
                        description: DisableStartup disables the startup probe when
                          true.
                        type: boolean
                    type: object
                  retry:
                    description: Retry overrides the resolved retry policy.
                    properties:
                      backoff:
                        description: |-
                          Backoff strategy for retry delays
                          - exponential: 1s, 2s, 4s, 8s... (doubles each time)
                          - linear: 1s, 2s, 3s, 4s... (increases by delay each time)
                          - constant: 1s, 1s, 1s, 1s... (same delay each time)
                        enum:
                        - exponential
                        - linear
                        - constant
                        type: string
                      delay:
                        default: 1s
                        description: |-
                          Base delay between retries
                          Examples: "1s", "5s", "30s"
                        type: string
                      maxRetries:
                        default: 3
                        description: Maximum number of retry attempts
                        format: int32
                        maximum: 10
                        minimum: 0
                        type: integer
                    type: object
                  security:
                    description: Security overrides pod-level security settings.
                    properties:
                      allowPrivilegeEscalation:
                        description: Whether to allow privilege escalation
                        type: boolean
                      readOnlyRootFilesystem:
                        description: Read-only root filesystem
                        type: boolean
                      requiredSecrets:
                        description: Required secrets for this workload
                        items:
                          type: string
                        type: array
                      runAsNonRoot:
                        description: Whether to run as non-root user
                        type: boolean
                      runAsUser:
                        description: User ID to run as
                        format: int64
                        type: integer
                    type: object
                  serviceAccountName:
                    description: ServiceAccountName overrides the ServiceAccount in
                      use.
                    type: string
                  storage:
                    description: Storage overrides the resolved storage policy (e.g.,
                      enable S3 or file providers).
                    properties:
                      file:
                        description: File specifies configuration for a filesystem-backed
                          object store.
                        properties:
                          emptyDir:
                            description: |-
                              EmptyDir defines an ephemeral volume to provision for file storage. When both
                              EmptyDir and VolumeClaimName are omitted, an EmptyDir{} volume is used by default.
                            properties:
                              medium:
                                description: |-
                                  medium represents what type of storage medium should back this directory.
                                  The default is "" which means to use the node's default medium.
                                  Must be an empty string (default) or Memory.
                                  More info: https://kubernetes.io/docs/concepts/storage/volumes#emptydir
                                type: string
                              sizeLimit:
                                anyOf:
                                - type: integer
                                - type: string
                                description: |-
                                  sizeLimit is the total amount of local storage required for this EmptyDir volume.
                                  The size limit is also applicable for memory medium.
                                  The maximum usage on memory medium EmptyDir would be the minimum value between
                                  the SizeLimit specified here and the sum of memory limits of all containers in a pod.
                                  The default is nil which means that the limit is undefined.
                                  More info: https://kubernetes.io/docs/concepts/storage/volumes#emptydir
                                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                x-kubernetes-int-or-string: true
                            type: object
                          path:
                            description: |-
                              Path is the directory inside the container where the storage backend should write files.
                              Defaults to "/var/run/bubu/storage" when omitted.
                            type: string
                          volumeClaimName:
                            description: |-
                              VolumeClaimName references an existing PersistentVolumeClaim mounted to the workload.
                              Mutually exclusive with EmptyDir.
                            type: string
                        type: object
                      s3:
                        description: S3 specifies the configuration for an S3-compatible
                          object store.
                        properties:
                          authentication:
                            description: Authentication configures how the workload
                              authenticates with S3.
                            properties:
                              secretRef:
                                description: |-
                                  SecretRef references a Kubernetes Secret that contains the credentials.
                                  The secret must contain keys 'accessKeyID' and 'secretAccessKey'.
                                properties:
                                  name:
                                    default: ""
                                    description: |-
                                      Name of the referent.
                                      This field is effectively required, but due to backwards compatibility is
                                      allowed to be empty. Instances of this type with an empty value here are
                                      almost certainly wrong.
                                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                    type: string
                                type: object
                                x-kubernetes-map-type: atomic
                              serviceAccountAnnotations:
                                additionalProperties:
                                  type: string
                                description: |-
                                  ServiceAccountAnnotations allows specifying annotations to be added to the
                                  auto-generated ServiceAccount. This is the recommended approach for
                                  IAM-based authentication on cloud providers (e.g., IRSA on EKS).
                                  The key-value pairs will be added to the ServiceAccount's metadata.annotations.
                                type: object
                            type: object
                          bucket:
                            description: Bucket is the name of the S3 bucket.
                            type: string
                          endpoint:
                            description: Endpoint is the S3 endpoint URL. Useful for
                              S3-compatible stores like MinIO.
                            type: string
                          region:
                            description: Region is the AWS region of the bucket.
                            type: string
                          usePathStyle:
                            description: UsePathStyle forces path-style addressing
                              for S3-compatible providers that require it.
                            type: boolean
                        required:
                        - authentication
                        - bucket
                        type: object
                      timeoutSeconds:
                        description: 'NOTE: GCS, AzureBlob, etc., can be added here
                          in the future.'
                        type: integer
                    type: object
                  timeout:
                    description: Timeout overrides the resolved execution timeout
                      (Go duration string).
                    type: string
                type: object
              mapping:
                description: Mapping describes how an incoming event is converted
                  into Story inputs.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              secrets:
                additionalProperties:
                  type: string
                description: Secrets maps template-defined secret inputs to concrete
                  namespace Secrets.
                type: object
              service:
                description: |-
                  Service controls instance-level exposure of the impulse via a Service.
                  Ports and health come from the template; this sets type/labels/annotations.
                  If omitted, defaults to ClusterIP with template-defined ports.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations are merged into the Service metadata.
                    type: object
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels are merged into the Service metadata.
                    type: object
                  type:
                    description: Type is the Service type (ClusterIP, NodePort, LoadBalancer).
                    type: string
                type: object
              storyRef:
                description: StoryRef identifies the Story executed when the trigger
                  fires.
                properties:
                  name:
                    description: |-
                      Name of the referenced object.
                      Must be a valid DNS-1123 label as defined by Kubernetes naming conventions.
                    maxLength: 253
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                  namespace:
                    description: |-
                      Namespace of the referenced object.
                      If empty, defaults to same namespace as the referencing object.

                      Cross-namespace references should be used carefully and only when
                      multi-tenancy is properly configured. Consider the security implications:
                      - Ensure RBAC policies allow cross-namespace access
                      - Validate that the target namespace is trusted
                      - Monitor cross-namespace references for security compliance
                    maxLength: 63
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                  uid:
                    description: |-
                      UID of the referenced Story for drift detection.
                      This field is populated by controllers and should not be set by users.

                      When a controller resolves this reference, it stores the target's UID.
                      On subsequent reconciliations, if the UID has changed, it indicates
                      the target was deleted and recreated, which may require special handling.
                    type: string
                required:
                - name
                type: object
              templateRef:
                description: TemplateRef selects the ImpulseTemplate that implements
                  the trigger mechanics.
                properties:
                  name:
                    description: Name of the referenced ImpulseTemplate.
                    maxLength: 253
                    minLength: 1
                    type: string
                  uid:
                    description: UID of the referenced ImpulseTemplate for drift detection.
                    type: string
                required:
                - name
                type: object
              with:
                description: With carries template-specific configuration and is validated
                  by the template.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              workload:
                description: Workload controls the backing workload for the impulse
                  (deployment or statefulset).
                properties:
                  job:
                    description: Job config applies when Mode is job.
                    properties:
                      activeDeadlineSeconds:
                        description: ActiveDeadlineSeconds mirrors spec.activeDeadlineSeconds.
                        format: int64
                        type: integer
                      backoffLimit:
                        description: BackoffLimit mirrors spec.backoffLimit.
                        format: int32
                        type: integer
                      completions:
                        description: Completions mirrors spec.completions.
                        format: int32
                        type: integer
                      parallelism:
                        description: Parallelism mirrors spec.parallelism.
                        format: int32
                        type: integer
                      ttlSecondsAfterFinished:
                        description: TTLSecondsAfterFinished mirrors spec.ttlSecondsAfterFinished.
                        format: int32
                        type: integer
                    type: object
                  mode:
                    default: job
                    description: |-
                      Mode selects the workload controller backing the component.
                        * job        – short-lived, run-to-completion executions
                        * deployment – continuously running, stateless processes
                        * statefulset – continuously running processes with sticky identity
                    enum:
                    - job
                    - deployment
                    - statefulset
                    type: string
                  resources:
                    description: Resources specifies pod-level resource guarantees
                      and limits.
                    properties:
                      limits:
                        description: ResourceLimits defines maximum allowed resources
                        properties:
                          cpu:
                            type: string
                          ephemeralStorage:
                            type: string
                          memory:
                            type: string
                        type: object
                      nodeSelector:
                        additionalProperties:
                          type: string
                        description: Scheduling constraints
                        type: object
                      requests:
                        description: Resource requests and limits
                        properties:
                          cpu:
                            type: string
                          ephemeralStorage:
                            type: string
                          memory:
                            type: string
                        type: object
                      tolerations:
                        items:
                          type: string
                        type: array
                    type: object
                  statefulSet:
                    description: StatefulSet config applies when Mode is statefulset.
                    properties:
                      podManagementPolicy:
                        description: PodManagementPolicy mirrors spec.podManagementPolicy.
                        type: string
                      serviceName:
                        description: ServiceName is the headless Service used for
                          stable network identities.
                        type: string
                    required:
                    - serviceName
                    type: object
                  updateStrategy:
                    description: UpdateStrategy determines how the workload should
                      roll out changes.
                    properties:
                      rollingUpdate:
                        description: Rolling update configuration (only applies when
                          type=RollingUpdate)
                        properties:
                          maxSurge:
                            description: |-
                              Maximum number of pods that can be created above desired replicas during update
                              Only for Deployment (not StatefulSet)
                            type: string
                          maxUnavailable:
                            description: |-
                              Maximum number of pods that can be unavailable during update
                              Can be absolute number (ex: 5) or percentage (ex: 25%)
                            type: string
                        type: object
                      type:
                        description: |-
                          Type of update strategy
                          - RollingUpdate: Gradually replace old pods with new ones
                          - Recreate: Delete all old pods before creating new ones
                        enum:
                        - RollingUpdate
                        - Recreate
                        type: string
                    type: object
                type: object
            required:
            - storyRef
            - templateRef
            type: object
          status:
            description: ImpulseStatus reports observed trigger state and counters.
            properties:
              conditions:
                description: Conditions is the standard Kubernetes condition set (Ready,
                  etc.).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              failedTriggers:
                description: FailedTriggers counts events that failed validation or
                  launch.
                format: int64
                type: integer
              lastSuccess:
                description: LastSuccess records the timestamp of the most recent
                  successful Story launch.
                format: date-time
                type: string
              lastTrigger:
                description: LastTrigger records the timestamp of the most recent
                  event.
                format: date-time
                type: string
              observedGeneration:
                description: |-
                  observedGeneration is the most recent generation observed for this Impulse. It corresponds to the
                  Impulse's generation, which is updated on mutation by the API Server.
                format: int64
                type: integer
              phase:
                description: |-
                  Phase represents the current execution phase of a resource.
                  This enum is used consistently across all execution resources (Stories, StoryRuns, StepRuns)
                  to provide a unified view of execution state.

                  The phase progression typically follows:
                  Pending → Running → {Succeeded|Failed|Finished|Compensated|Paused|Blocked|Scheduling|Timeout|Aborted}

                  Some resources may also support Paused for manual intervention scenarios.

                  nolint:lll
                enum:
                - Pending
                - Running
                - Succeeded
                - Failed
                - Finished
                - Canceled
                - Compensated
                - Paused
                - Blocked
                - Scheduling
                - Timeout
                - Aborted
                type: string
              readyReplicas:
                format: int32
                type: integer
              replicas:
                description: Replicas and ReadyReplicas surface readiness information
                  reported by the backing workload.
                format: int32
                type: integer
              storiesLaunched:
                description: StoriesLaunched counts StoryRuns successfully started
                  from events.
                format: int64
                type: integer
              triggersReceived:
                description: TriggersReceived counts all events seen by the impulse.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

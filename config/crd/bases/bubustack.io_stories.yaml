                type: array
              version:
                description: Version identifies this Story for pinning by references.
                maxLength: 64
                type: string
            required:
            - steps
            type: object
            x-kubernetes-validations:
            - message: each step must set exactly one of ref or type
              rule: self.steps.all(step, has(step.ref) != has(step.type))
            - message: step names must be unique
              rule: self.steps.all(step, self.steps.exists_one(other, other.name ==
                step.name))
          status:
            description: status defines the observed state of Story
            properties:
              conditions:
                description: |-
                  Standard Kubernetes conditions for detailed status tracking (e.g., "Ready", "Validated")
                  This will indicate if the Story's syntax is valid and all referenced Engrams exist.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  for this Story.
                format: int64
                type: integer
              stepsTotal:
                description: |-
                  StepsTotal reflects the total number of steps defined in the story's specification.
                  This provides a quick way to understand the complexity of the story.
                format: int32
                type: integer
              transports:
                description: Transports mirrors the declared transports with lightweight
                  readiness info.
                items:
                  description: StoryTransportStatus mirrors declared transports in
                    status.
                  properties:
                    mode:
                      description: |-
                        TransportMode captures how a transport is intended to be used in a Story.
                        "hot" transports remain in-band/low-latency, whereas "fallback" transports
                        act as spillover targets (e.g. object storage).
                      enum:
                      - hot
                      - fallback
                      type: string
                    modeReason:
                      description: ModeReason explains why the controller selected
                        the effective mode (e.g., "declarative-default", "requires-primitives").
                      type: string
                    name:
                      type: string
                    transportRef:
                      type: string
                  required:
                  - name
                  - transportRef
                  type: object
                type: array
              triggers:
                description: |-
                  Triggers reports how many StoryRuns currently reference this Story.
                  This approximates how frequently the story has been executed.
                format: int64
                type: integer
              usageCount:
                description: UsageCount reports how many Impulses reference this Story.
                format: int32
                type: integer
              validationErrors:
                description: ValidationErrors captures human-readable validation problems,
                  when present.
                items:
                  type: string
                type: array
              validationStatus:
                description: ValidationStatus indicates whether this Story's specification
                  passed validation.
                enum:
                - valid
                - invalid
                - unknown
                - pending
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

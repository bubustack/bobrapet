  name: transportbindings.transport.bubustack.io
spec:
  group: transport.bubustack.io
  names:
    categories:
    - bubu
    - transport
    kind: TransportBinding
    listKind: TransportBindingList
    plural: transportbindings
    shortNames:
    - tb
    - tbind
    singular: transportbinding
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.transportRef

                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              downstreamHost:
                description: |-
                  downstreamHost is the resolved downstream endpoint (host:port) for the engram owning this binding.
                  This is populated when the engram can accept direct P2P connections from upstream engrams.
                type: string
              endpoint:
                description: endpoint is the connector endpoint (host:port or unix
                  socket) for this binding.
                type: string
              negotiatedAudio:
                description: negotiatedAudio captures the codec the connector selected
                  for audio.
                properties:
                  channels:
                    description: channels indicates the number of channels carried
                      by this codec.
                    format: int32
                    type: integer
                  name:
                    description: name of the codec (e.g., pcm16, opus, g711-mu)
                    enum:
                    - pcm16
                    - pcm24
                    - opus
                    - g711-mu
                    - g711-a
                    - g722
                    - aac
                    - mp3
                    - flac
                    - raw
                    type: string
                  sampleRateHz:
                    description: sampleRateHz indicates the sampling rate for this
                      codec.
                    format: int32
                    type: integer
                required:
                - name
                type: object
              negotiatedBinary:
                description: negotiatedBinary captures the MIME type the connector
                  selected for binary payloads.
                type: string
              negotiatedVideo:
                description: negotiatedVideo captures the codec the connector selected
                  for video.
                properties:
                  name:
                    description: name of the codec (e.g., h264, vp8, raw-yuv420)
                    enum:
                    - h264
                    - vp8
                    - vp9
                    - av1
                    - raw-yuv420
                    - raw-rgb
                    - raw-bgr
                    type: string
                  profile:
                    description: profile or format hint (e.g., baseline, high, rgb)
                    type: string
                required:
                - name
                type: object
              observedGeneration:
                format: int64
                type: integer
              upstreamHost:
                description: |-
                  upstreamHost is the resolved upstream endpoint (host:port) that this engram should connect to.
                  This is populated when the connection can bypass the hub and use direct P2P routing.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}

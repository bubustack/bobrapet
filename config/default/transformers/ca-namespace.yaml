apiVersion: builtin
kind: PatchTransformer
metadata:
  name: bobrapet-ca-root-overrides
patch: |-
  - op: replace
    path: /metadata/namespace
    value: cert-manager
  - op: replace
    path: /metadata/name
    value: bobrapet-ca-root
target:
  kind: Certificate
  name: bobrapet-ca-root
---
apiVersion: builtin
kind: PatchTransformer
metadata:
  name: bobrapet-selfsigned-bootstrap-name
patch: |-
  - op: replace
    path: /metadata/name
    value: bobrapet-selfsigned-bootstrap
  - op: remove
    path: /metadata/namespace
target:
  kind: ClusterIssuer
  name: bobrapet-selfsigned-bootstrap
---
apiVersion: builtin
kind: PatchTransformer
metadata:
  name: bobrapet-shared-ca-name
patch: |-
  - op: replace
    path: /metadata/name
    value: bobrapet-shared-ca
  - op: remove
    path: /metadata/namespace
target:
  kind: ClusterIssuer
  name: bobrapet-shared-ca

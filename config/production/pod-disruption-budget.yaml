apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: controller-manager-pdb
  labels:
    control-plane: controller-manager
spec:
  minAvailable: 1
  selector:
    matchLabels:
      control-plane: controller-manager
---
# Additional PDB for webhook availability during updates
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: controller-manager-webhook-pdb
  labels:
    control-plane: controller-manager
    component: webhook
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      control-plane: controller-manager

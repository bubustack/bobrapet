# This rule is not used by the project bobrapet itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the runs.bubu.sh.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: bobrapet
    app.kubernetes.io/managed-by: kustomize
  name: runs-steprun-editor-role
rules:
- apiGroups:
  - runs.bubu.sh
  resources:
  - stepruns
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - runs.bubu.sh
  resources:
  - stepruns/status
  verbs:
  - get

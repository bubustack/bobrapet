# This rule is not used by the project bobrapet itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to transport.bubustack.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: bobrapet
    app.kubernetes.io/managed-by: kustomize
  name: transport-transport-viewer-role
rules:
- apiGroups:
  - transport.bubustack.io
  resources:
  - transports
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - transport.bubustack.io
  resources:
  - transports/status
  verbs:
  - get

# Aggregated EngramTemplate samples from sibling engram repositories
# Generated by hack/sync-templates.sh. Do not edit manually.

---
apiVersion: catalog.bubustack.io/v1alpha1
kind: EngramTemplate
metadata:
  name: http-request
spec:
  version: 0.1.0
  description: "Makes an HTTP request to a specified URL."
  supportedModes:
    - job
    - deployment
    - statefulset
  image: ghcr.io/bubustack/http-request-engram:0.1.0
  configSchema:
    type: object
    properties:
      defaultURL:
        type: string
        description: "The default URL to use if 'url' is not provided in the input."
      defaultMethod:
        type: string
        description: "The default HTTP method to use if 'method' is not provided in the input."
      defaultHeaders:
        type: object
        description: "Default HTTP headers. Input headers will be merged on top of these."
        additionalProperties:
          type: string
      auth:
        type: object
        description: "Authentication configuration for the engram instance."
        properties:
          type:
            type: string
            enum: ["bearer", "basic", "customHeader"]
            description: "The authentication type."
          headerName:
            type: string
            description: "The name of the header for 'customHeader' auth."
      proxy:
        type: string
        description: "The URL of the HTTP proxy to use for requests (e.g., 'http://user:pass@host:port')."
      batching:
        type: object
        description: "Configuration for batching requests in streaming mode. This has no effect in job mode."
        properties:
          itemsPerBatch:
            type: integer
            default: 50
            description: "The maximum number of requests to send concurrently in a single batch."
          batchInterval:
            type: string
            default: "1s"
            description: "The time to wait after one batch completes before starting the next (e.g., '500ms', '2s')."
      pagination:
        type: object
        description: "Configuration for paginating API results in job mode. Fetches all pages and combines results."
        properties:
          mode:
            type: string
            enum: ["off", "nextUrl", "updateParam"]
            default: "off"
            description: "The pagination mode to use. Has no effect in streaming mode."
          resultsPath:
            type: string
            description: "JSONPath to the array of results in the response body (e.g., '$.data[*]'). If empty, the entire body is treated as the result."
          maxPages:
            type: integer
            default: 100
            description: "A safeguard limit for the maximum number of pages to fetch."
          nextURLPath:
            type: string
            description: "For 'nextUrl' mode: JSONPath to the URL for the next page in the response body (e.g., '$.links.next')."
          updateParam:
            type: object
            description: "For 'updateParam' mode: Configuration for the parameter to update on each request."
            properties:
              name:
                type: string
                description: "The name of the query parameter to update for each page (e.g., 'page', 'offset')."
              type:
                type: string
                enum: ["page", "offset", "cursor"]
                description: "The type of the parameter to update."
              initialValue:
                type: string
                default: "1"
                description: "The initial value for the parameter (use a string to accommodate cursors)."
              increment:
                type: integer
                default: 1
                description: "The value to increment for 'page' or 'offset' types."
              cursorPath:
                type: string
                description: "For 'cursor' type: JSONPath to the value for the next cursor in the response body."
      queryParams:
        type: object
        description: "Configuration for how query parameters are formatted."
        properties:
          arrayFormat:
            type: string
            enum: ["noBrackets", "brackets", "indices"]
            default: "noBrackets"
            description: "Controls the format for arrays in query parameters: noBrackets (foo=v1&foo=v2), brackets (foo[]=v1&foo[]=v2), or indices (foo[0]=v1&foo[1]=v2)."
      response:
        type: object
        description: "Configuration for handling the HTTP response."
        properties:
          includeHeaders:
            type: boolean
            default: true
            description: "If true, includes response headers in the output."
          includeStatus:
            type: boolean
            default: true
            description: "If true, includes the status code and text in the output."
          format:
            type: string
            enum: ["auto", "json", "text", "file"]
            default: "auto"
            description: "The format for the response body."
          outputFieldName:
            type: string
            default: "body"
            description: "The field name to use for the output when format is 'text' or 'file'."
      neverError:
        type: boolean
        default: false
        description: "If true, the engram will succeed even on non-2xx HTTP status codes."
      timeout:
        type: string
        default: "10s"
        description: "Timeout for the HTTP request (e.g., '10s', '1m')."
      redirects:
        type: object
        description: "Configuration for handling HTTP redirects."
        properties:
          follow:
            type: boolean
            default: true
            description: "If true, the client will follow redirects."
          maxRedirects:
            type: integer
            default: 10
            description: "The maximum number of redirects to follow."
      ignoreSSLIssues:
        type: boolean
        default: false
        description: "If true, SSL certificate validation will be skipped."
  secretSchema:
    bearerToken:
      description: "Secret containing the bearer token. Must have a 'bearer_token' key."
      expectedKeys: ["bearer_token"]
      required: false
    basicAuth:
      description: "Secret for basic auth. Must have 'basic_username' and 'basic_password' keys."
      expectedKeys: ["basic_username", "basic_password"]
      required: false
    customHeader:
      description: "Secret for a custom header. Must have a 'custom_header_value' key."
      expectedKeys: ["custom_header_value"]
      required: false
    proxyAuth:
      description: "Secret for proxy authentication. Must have 'proxy_username' and 'proxy_password' keys."
      expectedKeys: ["proxy_username", "proxy_password"]
      required: false
  inputSchema:
    type: object
    properties:
      url:
        type: string
        description: "The URL to send the request to."
      method:
        type: string
        description: "The HTTP method to use (GET, POST, etc.)."
        default: "GET"
      headers:
        type: object
        description: "A map of HTTP headers to send with the request."
        additionalProperties:
          type: string
      body:
        type: string
        description: "The request body (for POST, PUT, etc.)."
    required:
      - url
  outputSchema:
    type: object
    properties:
      statusCode:
        type: integer
        description: "The HTTP status code of the response."
      status:
        type: string
        description: "The HTTP status text of the response."
      headers:
        type: object
        description: "A map of the response headers."
      body:
        type: string
        description: "The response body."
    service:
      ports:
        - name: grpc
          protocol: TCP
          port: 9000
          targetPort: 9000


apiVersion: catalog.bubustack.io/v1alpha1
kind: EngramTemplate
metadata:
  name: livekit-agent
spec:
  version: 0.1.0
  description: Realtime LiveKit ingress/egress bridge for bobrapet streaming stories.
  image: ghcr.io/bubustack/livekit-agent-engram:latest
  supportedModes:
    - deployment
    - job
  configSchema:
    type: object
    properties:
      livekitURL:
        type: string
        description: WSS/HTTPS URL of your LiveKit deployment or sandbox.
      agentIdentityPrefix:
        type: string
        description: Prefix used when auto-generating the bot's participant identity.
        default: bubu-agent
      playbackTrackName:
        type: string
        description: Name of the playback track published to LiveKit.
        default: agent-playback
      sourceAllowlist:
        type: array
        description: Optional list of participant identities to capture (supports exact, '*', and 'prefix*').
        items:
          type: string
      capture:
        type: object
        properties:
          encoding:
            type: string
            default: pcm
          sampleRate:
            type: integer
            default: 48000
          channels:
            type: integer
            default: 1
  inputSchema:
    type: object
    properties:
      room:
        type: object
        required: true
        properties:
          name: { type: string }
          sid: { type: string }
      participant:
        type: object
        properties:
          identity: { type: string }
          sid: { type: string }
      event:
        type: object
        description: Raw webhook payload forwarded from the impulse.
      policy:
        type: object
        description: Policy metadata forwarded from the impulse.
      agentIdentity:
        type: string
        description: Optional override for the bot's LiveKit identity.
  outputSchema:
    anyOf:
      - type: object
        properties:
          type:
            const: speech.audio.v1
          audio:
            type: object
            properties:
              encoding: { type: string }
              sampleRate: { type: integer }
              channels: { type: integer }
              data: { type: string, description: Base64 PCM chunk }
              storage:
                type: object
                properties:
                  path: { type: string }
                  contentType: { type: string }
                  sizeBytes: { type: integer }
      - type: object
        properties:
          type:
            enum: [livekit.session.started, livekit.session.ended]
          room: { type: object }
          participant: { type: object }
  secretSchema:
    livekit:
      required: true
      description: LiveKit API key/secret with privileges to join rooms.
      mountType: env
      envPrefix: LIVEKIT_
      expectedKeys:
        - API_KEY
        - API_SECRET
  execution:
    service:
      ports:
        - name: grpc
          protocol: TCP
          port: 50051
          targetPort: 50051


apiVersion: catalog.bubustack.io/v1alpha1
kind: EngramTemplate
metadata:
  name: livekit-turn-detector
spec:
  version: 0.1.0
  description: "Buffers LiveKit PCM packets, performs WebRTC VAD, and emits speech.vad.active turn payloads."
  image: ghcr.io/bubustack/livekit-turn-detector-engram:latest
  supportedModes:
    - deployment
    - job
  configSchema:
    type: object
    properties:
      frameDurationMs:
        type: integer
        default: 20
        description: Frame size (in milliseconds) used when feeding audio into the VAD.
      silenceDurationMs:
        type: integer
        default: 400
        description: Minimum trailing silence required to close a turn.
      minDurationMs:
        type: integer
        default: 200
        description: Minimum speech duration before a turn is emitted.
      maxDurationMs:
        type: integer
        default: 10000
        description: Hard cap on a single turn; useful to avoid indefinite buffers.
      aggressiveness:
        type: integer
        default: 2
        minimum: 0
        maximum: 3
        description: WebRTC VAD aggressiveness (0 = relaxed, 3 = most strict).
      outputEncoding:
        type: string
        enum: [wav, pcm]
        default: wav
        description: Format used for emitted audio turns.
  inputSchema:
    type: object
    properties:
      type:
        const: speech.audio.v1
      room:
        type: object
      participant:
        type: object
        properties:
          identity: { type: string }
          sid: { type: string }
      audio:
        type: object
        properties:
          encoding: { type: string }
          sampleRate: { type: integer }
          channels: { type: integer }
          data: { type: string, description: Base64-encoded PCM16 chunk }
  outputSchema:
    type: object
    properties:
      type:
        const: speech.vad.active
      room:
        type: object
      participant:
        type: object
      sequence:
        type: integer
      durationMs:
        type: integer
      audio:
        type: object
        properties:
          encoding: { type: string }
          sampleRate: { type: integer }
          channels: { type: integer }
          data: { type: string, description: Base64-encoded buffered audio }
          storage:
            type: object
            properties:
              path: { type: string }
              contentType: { type: string }
              sizeBytes: { type: integer }
  execution:
    service:
      ports:
        - name: grpc
          protocol: TCP
          port: 50051
          targetPort: 50051


apiVersion: catalog.bubustack.io/v1alpha1
kind: EngramTemplate
metadata:
  name: mcp-adapter
spec:
  version: "0.1.0"
  description: "Connects to an external MCP server over Streamable HTTP or manages a stdio runner Pod and attaches via Pods/Attach. Returns raw MCP payloads under output.result."
  image: ghcr.io/bubustack/mcp-adapter-engram:0.1.0
  supportedModes:
    - job
    - deployment
    - statefulset

  configSchema:
    type: object
    properties:
      transport:
        type: string
        enum:
          - streamable_http
          - stdio
        required: true
        description: "Transport to use for MCP communication. Exactly one active connection per engram instance."
      server:
        type: object
        description: "Configuration for Streamable HTTP transport (external server)."
        properties:
          baseURL:
            type: string
            description: "Single MCP endpoint supporting POST and GET as per Streamable HTTP."
            required: true
          headers:
            type: object
            additionalProperties:
              type: string
            description: "Additional HTTP headers to include on every request (e.g., Authorization)."
          headersFromSecret:
            type: object
            additionalProperties:
              type: string
            description: "Map of HTTP header names to secret references (<bucket>:<key> or <key>) resolved from Engram secrets."
      stdio:
        type: object
        description: "Configuration for stdio transport via a runner Pod (Pods/Attach)."
        properties:
          image:
            type: string
            description: "Container image to run as the MCP server."
            required: true
          imagePullPolicy:
            type: string
            enum: [IfNotPresent, Always, Never]
          command:
            type: array
            items:
              type: string
          args:
            type: array
            items:
              type: string
          resources:
            type: object
            description: "v1alpha1.WorkloadResources compatible shape."
            properties:
              requests:
                type: object
                properties:
                  cpu:
                    type: string
                  memory:
                    type: string
                  ephemeralStorage:
                    type: string
              limits:
                type: object
                properties:
                  cpu:
                    type: string
                  memory:
                    type: string
                  ephemeralStorage:
                    type: string
          security:
            type: object
            description: "v1alpha1.WorkloadSecurity compatible shape."
            properties:
              runAsNonRoot:
                type: boolean
              allowPrivilegeEscalation:
                type: boolean
              readOnlyRootFilesystem:
                type: boolean
              runAsUser:
                type: integer
          nodeSelector:
            type: object
            additionalProperties:
              type: string
          tolerations:
            type: array
            items:
              type: object
              x-kubernetes-preserve-unknown-fields: true
          podLabels:
            type: object
            additionalProperties:
              type: string
          podAnnotations:
            type: object
            additionalProperties:
              type: string
          deletionPolicy:
            type: string
            enum: [DeleteOnFinish, Keep]
            description: "DeleteOnFinish by default."
          terminationGracePeriodSeconds:
            type: integer
          useEphemeralSecret:
            type: boolean
            description: "If true, inject secrets via an ephemeral Secret (envFrom)."
      mcp:
        type: object
        properties:
          initClientCapabilities:
            type: object
            description: "Capabilities forwarded in MCP Initialize."
    additionalProperties: false

  secretSchema:
    server:
      description: "Arbitrary env keys → container env for stdio runner Pod. Streamable HTTP can reference values via server.headersFromSecret."
      mountType: "env"
      expectedKeys: []

  inputSchema:
    type: object
    properties:
      action:
        type: string
        enum:
          - listTools
          - callTool
          - listResources
          - readResource
          - getPrompt
        required: true
      tool:
        type: string
      arguments:
        type: object
      resourceURI:
        type: string
      promptName:
        type: string
      timeout:
        type: string
      server:
        type: string
        description: "Reserved; ignored in v1 (single server)."

  outputSchema:
    type: object
    properties:
      result:
        x-kubernetes-preserve-unknown-fields: true
        description: "Raw MCP payload, verbatim (object/array/primitive)."
      server:
        type: string
      tool:
        type: string
      durationMs:
        type: integer
      tools:
        type: array
      resources:
        type: array
      notifications:
        type: array
      error:
        type: string
  execution:
    service:
      ports:
        - name: grpc
          protocol: TCP
          port: 9000
          targetPort: 9000


apiVersion: catalog.bubustack.io/v1alpha1
kind: EngramTemplate
metadata:
  name: openai-chat
spec:
  version: 0.1.0
  description: "A conversational LLM engram using OpenAI's chat models."
  image: ghcr.io/bubustack/openai-chat-engram:0.1.0
  supportedModes:
    - deployment
    - statefulset
    - job

  configSchema:
    type: object
    properties:
      defaultModel:
        type: string
        description: "The OpenAI chat model to use (e.g., gpt-4, gpt-3.5-turbo)."
        default: "gpt-3.5-turbo"
      defaultTemperature:
        type: number
        description: "Controls randomness in the model's output."
        default: 0.7
      defaultSystemPrompt:
        description: "The initial system message to guide the model's behavior."
        default: "You are a helpful assistant."
        oneOf:
          - type: string
          - type: object
            minProperties: 1
            maxProperties: 1
            additionalProperties: false
            properties:
              $bubuStorageRef:
                type: string
              $bubuConfigMapRef:
                oneOf:
                  - type: string
                  - type: object
                    additionalProperties: false
                    properties:
                      name: { type: string }
                      key: { type: string }
                      namespace: { type: string }
                      format: { type: string, enum: [auto, json, raw] }
                    required: [name, key]
              $bubuSecretRef:
                oneOf:
                  - type: string
                  - type: object
                    additionalProperties: false
                    properties:
                      name: { type: string }
                      key: { type: string }
                      namespace: { type: string }
                      format: { type: string, enum: [auto, json, raw] }
                    required: [name, key]
      defaultTopP:
        type: number
        description: "Default nucleus sampling probability mass (top_p)."
        default: 0.9
      defaultMaxTokens:
        type: integer
        description: "Maximum total tokens (legacy)."
        default: 0
      defaultMaxCompletionTokens:
        type: integer
        description: "Maximum completion tokens (preferred)."
        default: 0
      defaultPresencePenalty:
        type: number
        description: "Presence penalty applied when no override is provided."
        default: 0
      defaultFrequencyPenalty:
        type: number
        description: "Frequency penalty applied when no override is provided."
        default: 0
      defaultReasoningEffort:
        type: string
        enum: [minimal, low, medium, high]
        description: "Reasoning effort hint for reasoning models."
      defaultServiceTier:
        type: string
        enum: [auto, default, flex, scale, priority]
        description: "Preferred service tier when supported."
      defaultVerbosity:
        type: string
        enum: [low, medium, high]
        description: "Verbosity hint for models that support it."
      defaultModalities:
        type: array
        description: "Default output modalities (e.g. ['text'], ['text','audio'])."
        items:
          type: string
      defaultStopSequences:
        type: array
        description: "Sequences that will stop generation when encountered."
        items:
          type: string
      defaultStore:
        type: boolean
        description: "Whether to allow OpenAI to store responses by default."
      defaultParallelToolCalls:
        type: boolean
        description: "Enable parallel function/tool calls by default."
      defaultLogprobs:
        type: boolean
        description: "Return token log probabilities by default."
      defaultTopLogprobs:
        type: integer
        description: "Number of logprob candidates to include when logprobs are enabled."
      defaultChoices:
        type: integer
        minimum: 1
        description: "Default number of choices (OpenAI n parameter) to request."
      defaultSeed:
        type: integer
        description: "Deterministic seed used when supported."
      defaultPromptCacheKey:
        type: string
        description: "Prompt cache key used for OpenAI prompt caching."
      defaultSafetyIdentifier:
        type: string
        description: "Default safety identifier for abuse monitoring."
      defaultUser:
        type: string
        description: "Default user identifier forwarded to OpenAI."
      defaultMetadata:
        type: object
        description: "Default metadata map sent with each request."
        additionalProperties:
          type: string
      defaultLogitBias:
        type: object
        description: "Default logit bias map (token id -> bias)."
        additionalProperties:
          type: integer
      responseFormat:
        type: object
        description: "Structured output configuration."
        properties:
          type:
            type: string
            enum: [text, json_object, json_schema]
          jsonSchema:
            type: object
            properties:
              name: { type: string }
              description: { type: string }
              strict: { type: boolean }
              schema: { type: object }
      audio:
        type: object
        description: "Default audio response configuration when using multimodal chat models."
        properties:
          format:
            type: string
            enum: [wav, aac, mp3, flac, opus, pcm16]
          voice:
            type: string
            description: "Preferred audio voice (alloy, ash, nova, etc.)."
      tools:
        type: array
        description: "Optional function tools available to the model."
        items:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            parameters:
              type: object
      functions:
        type: array
        description: "Legacy function definitions sent via the deprecated `functions` parameter."
        items:
          type: object
          properties:
            name: { type: string }
            description: { type: string }
            parameters: { type: object }
      toolChoice:
        type: string
        description: "Tool choice behavior (auto, required, none, or function:<name>)."
        enum: ["auto", "required", "none"]
        default: "auto"
      functionCall:
        type: string
        description: "Default value for the legacy function_call parameter (auto, none, or function:<name>)."
      allowedTools:
        type: object
        description: "Restrict tool usage to a curated set."
        properties:
          mode:
            type: string
            enum: [auto, required]
            default: auto
          tools:
            type: array
            items:
              type: string
      webSearch:
        type: object
        description: "Default web search options."
        properties:
          searchContextSize:
            type: string
            enum: [low, medium, high]
          userLocation:
            type: object
            properties:
              city: { type: string }
              country: { type: string }
              region: { type: string }
              timezone: { type: string }
      structuredToolName:
        type: string
        description: "Name of the function tool whose arguments should be emitted as structured output."
      dispatchTools:
        type: object
        description: "Map of toolName -> storyName to dispatch tool calls as actionRequest automatically."
      useResponsesAPI:
        type: boolean
        description: "Set true to route requests through OpenAI's Responses API instead of Chat Completions."
        default: false

  inputSchema:
    type: object
    properties:
      history:
        type: array
        items:
          type: object
          properties:
            role:
              type: string
              enum: ["system", "developer", "user", "assistant"]
            content:
              type: string
      temperature:
        type: number
        description: "Optional per-request temperature override."
      model:
        type: string
        description: "Optional per-request model override."
      systemPrompt:
        type: string
        description: "Optional per-request system prompt override."
      userPrompt:
        type: string
        description: "The user's latest message."
      developerPrompt:
        type: string
        description: "The developer's latest message."
      assistantPrompt:
        type: string
        description: "The assistant's latest message."
      topP:
        type: number
      maxTokens:
        type: integer
      maxCompletionTokens:
        type: integer
      presencePenalty:
        type: number
      frequencyPenalty:
        type: number
      stop:
        type: array
        items:
          type: string
      modalities:
        type: array
        items:
          type: string
      store:
        type: boolean
      parallelToolCalls:
        type: boolean
      logprobs:
        type: boolean
      topLogprobs:
        type: integer
      seed:
        type: integer
      serviceTier:
        type: string
        enum: [auto, default, flex, scale, priority]
      reasoningEffort:
        type: string
        enum: [minimal, low, medium, high]
      verbosity:
        type: string
        enum: [low, medium, high]
      responseFormat:
        type: object
        properties:
          type:
            type: string
            enum: [text, json_object, json_schema]
          jsonSchema:
            type: object
      metadata:
        type: object
        additionalProperties:
          type: string
      logitBias:
        type: object
        additionalProperties:
          type: integer
      audio:
        type: object
        properties:
          format:
            type: string
          voice:
            type: string
      promptCacheKey:
        type: string
      safetyIdentifier:
        type: string
      user:
        type: string
      tools:
        type: array
        description: "Optional per-request tool overrides."
        items:
          type: object
      toolChoice:
        type: string
        description: "Per-request tool choice override."
      choices:
        type: integer
        minimum: 1
        description: "Override for the OpenAI n parameter."
      functions:
        type: array
        description: "Per-request legacy functions list."
        items:
          type: object
      functionCall:
        type: string
        description: "Per-request override for function_call (auto, none, function:<name>)."
      allowedTools:
        type: object
        description: "Restrict tool usage for the specific request."
        properties:
          mode:
            type: string
            enum: [auto, required]
          tools:
            type: array
            items:
              type: string
      useResponsesAPI:
        type: boolean
        description: "Force this invocation to use the Responses API (true) or Chat Completions (false)."
      prediction:
        type: object
        description: "Optional prediction hint to accelerate responses."
        properties:
          text: { type: string }
      webSearch:
        type: object
        description: "Per-request web search options."
        properties:
          searchContextSize:
            type: string
            enum: [low, medium, high]
          userLocation:
            type: object
            properties:
              city: { type: string }
              country: { type: string }
              region: { type: string }
              timezone: { type: string }

  outputSchema:
    type: object
    properties:
      text:
        type: string
        description: "The model's text response."
      structured:
        type: object
        description: "Structured JSON emitted by a tool (e.g., validation/extract)."
      actionRequest:
        type: object
        description: "An optional structured request to trigger another story."
        properties:
          storyName:
            type: string
          inputs:
            type: object
      toolCalls:
        type: array
        description: "Raw tool calls emitted by the model."
        items:
          type: object
          properties:
            name:
              type: string
            arguments:
              type: string
            
  secretSchema:
    # This logical name 'openai' is used in the Engram resource to map to a Kubernetes secret.
    openai:
      required: true
      description: "OpenAI credentials. Only API_KEY is required; other keys are optional."
      # Mount the secret's keys as environment variables.
      mountType: "env"
      # The key 'API_KEY' from the k8s secret will be available as 'OPENAI_API_KEY' in the pod.
      envPrefix: "OPENAI_"
    azure:
      required: false
      description: "Azure OpenAI credentials (optional). If AZURE_ENDPOINT is set, Azure mode is used."
      mountType: "env"
      envPrefix: "AZURE_"
      expectedKeys:
        - "API_KEY"
        - "ENDPOINT"
        - "API_VERSION"
        - "DEPLOYMENT"
  execution:
    service:
      ports:
        - name: grpc
          protocol: TCP
          port: 50051
          targetPort: 50051


apiVersion: catalog.bubustack.io/v1alpha1
kind: EngramTemplate
metadata:
  name: openai-stt
spec:
  version: 0.1.1
  description: "Speech-to-text streaming engram using OpenAI Whisper and GPT-4o transcription models."
  image: ghcr.io/bubustack/openai-stt-engram:latest
  supportedModes:
    - deployment
    - job
  configSchema:
    type: object
    properties:
      model:
        type: string
        default: gpt-4o-mini-transcribe
        description: Preferred OpenAI transcription model ID.
      responseFormat:
        type: string
        enum: [auto, json, text, srt, verbose_json, vtt]
        default: auto
        description: Response format; auto selects a supported default for the chosen model.
      timestampGranularity:
        type: string
        enum: [none, word, segment, "word,segment"]
        default: none
        description: Optional timestamps to request when verbose_json is used.
      includeLogProbs:
        type: boolean
        default: false
        description: Include token-level log probabilities (supported on GPT-4o transcription models).
      diarize:
        type: boolean
        default: false
        description: Enable speaker diarization when supported (e.g. gpt-4o-transcribe-diarize).
      prompt:
        type: string
        description: Optional primer text to steer transcription output.
      temperature:
        type: number
        minimum: 0
        maximum: 1
        default: 0
        description: Sampling temperature for transcription (0 is deterministic).
      language:
        type: string
        default: en
        description: Default language hint (BCP-47) to improve accuracy and latency.
      include:
        type: array
        description: Values for OpenAI's include parameter (currently only "logprobs").
        items:
          type: string
      chunking:
        type: object
        description: Server-side voice-activity-detection settings for chunking long audio.
        properties:
          mode:
            type: string
            enum: [auto, off, server_vad]
            default: auto
            description: auto lets OpenAI choose, server_vad enables manual tuning, off disables hints.
          prefixPaddingMs:
            type: integer
            description: Milliseconds of audio to prepend before detected speech when using server_vad.
          silenceDurationMs:
            type: integer
            description: Silence duration threshold (ms) before ending a chunk when using server_vad.
          threshold:
            type: number
            minimum: 0
            maximum: 1
            description: Sensitivity for server_vad chunking.
      task:
        type: string
        enum: [transcribe, translate]
        default: transcribe
        description: Default operation; choose translate to always run the audio translation endpoint.
      stream:
        type: boolean
        default: false
        description: Enable OpenAI's SSE streaming mode for transcriptions by default.
      ignoreIdentities:
        type: array
        description: Drop packets whose participant identity matches any entry (supports `*` and `prefix*`).
        items:
          type: string
      allowIdentities:
        type: array
        description: Optional allowlist; when provided only matching participant identities are transcribed.
        items:
          type: string
  inputSchema:
    type: object
    properties:
      audio:
        type: object
        description: One of `data` or `storage` must be provided.
        properties:
          encoding:
            type: string
            description: PCM / opus / base64 encoded audio type.
          sampleRate:
            anyOf:
              - type: integer
              - type: string
          channels:
            anyOf:
              - type: integer
              - type: string
          data:
            type: string
            description: Base64-encoded audio payload.
          storage:
            type: object
            description: Reference to audio buffered in shared storage.
            properties:
              path:
                type: string
              contentType:
                type: string
              sizeBytes:
                type: integer
      responseFormat:
        type: string
        enum: [auto, json, text, srt, verbose_json, vtt]
        description: Optional override for the response format.
      format:
        type: string
        enum: [json, text, srt, verbose_json, vtt]
        description: Deprecated alias for responseFormat.
      language:
        type: string
        default: en
        description: Optional BCP-47 language hint.
      timestampGranularity:
        type: string
        enum: [none, word, segment, "word,segment"]
        description: Request-specific timestamp override.
      includeLogProbs:
        type: boolean
        description: Request-specific token log probability toggle.
      diarize:
        type: boolean
        description: Request-specific diarization toggle.
      prompt:
        type: string
        description: Optional primer text to steer transcription output.
      temperature:
        type: number
        description: Request-specific sampling temperature.
      include:
        type: array
        description: Request-specific include overrides (e.g. ["logprobs"]).
        items:
          type: string
      chunking:
        type: object
        description: Request-specific chunking override.
        properties:
          mode:
            type: string
            enum: [auto, off, server_vad]
          prefixPaddingMs:
            type: integer
          silenceDurationMs:
            type: integer
          threshold:
            type: number
      task:
        type: string
        enum: [transcribe, translate]
        description: Per-request override to run translation instead of transcription.
      stream:
        type: boolean
        description: Enable/disable SSE streaming for this request; inherits from config when omitted.
  outputSchema:
    type: object
    properties:
      text:
        type: string
        description: Transcript text.
      words:
        type: array
        description: Word timestamps when requested.
        items:
          type: object
          properties:
            word: { type: string }
            start: { type: number }
            end: { type: number }
      segments:
        type: array
        description: Segment timestamps when requested.
        items:
          type: object
          properties:
            text: { type: string }
            start: { type: number }
            end: { type: number }
      logprobs:
        type: array
        description: Token-level log probabilities when requested.
        items:
          type: object
      speakers:
        type: array
        description: Speaker summaries when diarization is enabled.
        items:
          type: object
      speakerSegments:
        type: array
        description: Segment timeline attributed to speakers.
        items:
          type: object
      speakerLabels:
        type: array
        description: Speaker labels when diarization is enabled.
        items:
          type: object
      model:
        type: string
      responseFormat:
        type: string
      language:
        type: string
      timestampGranularity:
        type: string
      task:
        type: string
        enum: [transcribe, translate]
        description: Indicates whether the request was transcribed or translated.
      usage:
        type: object
  secretSchema:
    openai:
      required: false
      description: "OpenAI API credentials. Provide API_KEY plus optional ORG_ID/PROJECT_ID/BASE_URL."
      mountType: env
      envPrefix: OPENAI_
    azure:
      required: false
      description: "Azure OpenAI credentials (ENDPOINT, API_KEY, DEPLOYMENT, API_VERSION)."
      mountType: env
      envPrefix: AZURE_
      expectedKeys: ["ENDPOINT", "API_KEY", "DEPLOYMENT", "API_VERSION"]
  execution:
    service:
      ports:
        - name: grpc
          protocol: TCP
          port: 50051
          targetPort: 50051


apiVersion: catalog.bubustack.io/v1alpha1
kind: EngramTemplate
metadata:
  name: openai-tts
spec:
  version: 0.1.0
  description: "Text-to-speech streaming engram powered by OpenAI's TTS and GPT-4o audio models."
  image: ghcr.io/bubustack/openai-tts-engram:latest
  supportedModes:
    - deployment
    - job
  configSchema:
    type: object
    properties:
      model:
        type: string
        default: gpt-4o-mini-tts
        description: OpenAI TTS model ID.
      voice:
        type: string
        default: alloy
        description: Default voice preset.
      format:
        type: string
        enum: [pcm, opus, mp3, wav, flac, aac]
        default: pcm
        description: Output format sent to the Audio Speech API.
      streamFormat:
        type: string
        enum: ["", audio, sse]
        default: ""
        description: Preferred OpenAI streaming format. `audio` yields chunked audio responses, `sse` emits text/event-stream chunks that the engram reassembles (with transcripts) before sending downstream.
      sampleRate:
        type: integer
        default: 48000
        description: Output sample rate in Hz.
      targetSampleRate:
        type: integer
        default: 0
        description: Optional resampling target for PCM outputs.
      channels:
        type: integer
        default: 1
        description: Number of audio channels in returned PCM.
      speed:
        type: number
        minimum: 0.25
        maximum: 4.0
        default: 1.0
        description: Playback speed multiplier.
      instructions:
        type: string
        description: Optional style instructions (supported on gpt-4o-mini-tts).
  inputSchema:
    type: object
    properties:
      text:
        required: true
        type: string
        description: Plain text to synthesize.
      voice:
        type: string
        description: Optional voice override.
      model:
        type: string
        description: Optional model override.
      format:
        type: string
        enum: [pcm, opus, mp3, wav, flac, aac]
        description: Output format preference.
      streamFormat:
        type: string
        enum: [audio, sse]
        description: Override for OpenAI stream_format (audio chunking or SSE events).
      sampleRate:
        type: integer
        description: Optional sample-rate override in Hz.
      channels:
        type: integer
        description: Optional channel-count override.
      speed:
        type: number
        description: Optional playback speed override.
      instructions:
        type: string
        description: Optional style instructions.
  outputSchema:
    type: object
    properties:
      type:
        type: string
        enum: [speech.audio.v1]
      model:
        type: string
      voice:
        type: string
      responseFormat:
        type: string
      contentType:
        type: string
      audio:
        type: object
        properties:
          encoding: { type: string }
          sampleRate: { type: integer }
          channels: { type: integer }
          data: { type: string, description: Base64-encoded audio payload }
          storage:
            type: object
            properties:
              path: { type: string }
              contentType: { type: string }
              sizeBytes: { type: integer }
      speed:
        type: number
      instructions:
        type: string
      transcript:
        type: string
        description: Final transcript returned when SSE streaming is enabled.
  secretSchema:
    openai:
      required: false
      description: "OpenAI API credentials. Provide API_KEY and optional ORG_ID/PROJECT_ID/BASE_URL overrides."
      mountType: env
      envPrefix: OPENAI_
    azure:
      required: false
      description: "Azure OpenAI credentials. Requires ENDPOINT, API_KEY, and DEPLOYMENT when used."
      mountType: env
      envPrefix: AZURE_
      expectedKeys: ["ENDPOINT", "API_KEY", "DEPLOYMENT", "API_VERSION"]
  execution:
    service:
      ports:
        - name: grpc
          protocol: TCP
          port: 50051
          targetPort: 50051


apiVersion: catalog.bubustack.io/v1alpha1
kind: EngramTemplate
metadata:
  name: silero-vad
spec:
  version: 0.1.0
  description: "Silero ONNX-based VAD that emits speech.vad.active payloads."
  image: ghcr.io/bubustack/silero-vad-engram:latest
  supportedModes:
    - deployment
    - job
  configSchema:
    type: object
    properties:
      modelPath:
        type: string
        default: /models/silero_vad.onnx
        description: Filesystem path to the Silero ONNX model.
      detectorSampleRateHz:
        type: integer
        enum: [8000, 16000]
        default: 16000
        description: Sample rate used by the Silero model.
      threshold:
        type: number
        minimum: 0.05
        maximum: 0.95
        default: 0.5
        description: Speech activation probability threshold.
      frameDurationMs:
        type: integer
        default: 32
        description: Frame duration consumed per VAD decision.
      minSilenceDurationMs:
        type: integer
        default: 400
        description: Minimum trailing silence to close a turn.
      minDurationMs:
        type: integer
        default: 200
        description: Minimum speech duration required to emit a turn.
      maxDurationMs:
        type: integer
        default: 12000
        description: Hard cap on a single buffered turn.
      outputEncoding:
        type: string
        enum: [wav, pcm]
        default: wav
        description: Encoding for emitted audio buffers.
      inlineAudioLimit:
        type: integer
        default: 65536
        description: Inline audio byte budget before offloading to shared storage.
  inputSchema:
    type: object
    properties:
      type:
        const: speech.audio.v1
      room:
        type: object
      participant:
        type: object
      audio:
        type: object
        properties:
          encoding: { type: string }
          sampleRate: { type: integer }
          channels: { type: integer }
          data: { type: string }
  outputSchema:
    type: object
    properties:
      type:
        const: speech.vad.active
      participant:
        type: object
      sequence:
        type: integer
      durationMs:
        type: integer
      audio:
        type: object
        properties:
          encoding: { type: string }
          sampleRate: { type: integer }
          channels: { type: integer }
          data: { type: string }
          storage:
            type: object
            properties:
              path: { type: string }
              contentType: { type: string }
              sizeBytes: { type: integer }
  execution:
    service:
      ports:
        - name: grpc
          protocol: TCP
          port: 50051
          targetPort: 50051


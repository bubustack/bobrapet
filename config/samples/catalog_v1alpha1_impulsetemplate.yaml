# Generated by hack/sync-templates.sh. Do not edit manually.

apiVersion: catalog.bubustack.io/v1alpha1
kind: ImpulseTemplate
metadata:
  name: cron
spec:
  version: 0.1.0
  description: |
    A cron-based impulse that triggers StoryRuns on configurable schedules.
    Supports multiple schedules, timezone configuration, jitter, and 
    concurrency policies.
  image: ghcr.io/bubustack/cron-impulse:latest
  supportedModes:
    - deployment

  configSchema:
    type: object
    properties:
      schedules:
        type: array
        description: List of cron schedules to run.
        required: true
        items:
          type: object
          properties:
            name:
              type: string
              description: Human-readable identifier for this schedule.
              required: true
            description:
              type: string
              description: Explains what this schedule does.
            cron:
              type: string
              description: |
                Cron expression (5-field format: minute hour day-of-month month day-of-week).
                Examples: "0 8 * * *" (8 AM daily), "*/5 * * * *" (every 5 minutes).
                Supports descriptors like "@hourly", "@daily", "@weekly".
              required: true
            inputs:
              type: object
              description: Inputs passed to the triggered story for this schedule.
            metadata:
              type: object
              additionalProperties:
                type: string
              description: Metadata attached to the StoryRun as annotations.
            enabled:
              type: boolean
              description: Whether this schedule is active. Defaults to true.
              default: true
            jitter:
              type: string
              description: |
                Random delay (0 to this duration) before triggering.
                Helps spread load. Examples: "30s", "5m".
      timezone:
        type: string
        description: Timezone for parsing cron expressions (IANA format). Defaults to UTC.
        default: UTC
      runOnStartup:
        type: boolean
        description: Trigger all schedules immediately on startup (useful for testing).
        default: false
      concurrencyPolicy:
        type: string
        enum:
          - allow
          - forbid
          - replace
        description: |
          Controls behavior when a schedule fires while previous run is active.
          - allow: Allow concurrent runs (default).
          - forbid: Skip new run if previous is active.
          - replace: Cancel previous run and start new one.
        default: allow

  execution:
    service:
      ports:
        - name: health
          protocol: TCP
          port: 8080
          targetPort: 8080
    resources:
      recommendedCpuRequest: 10m
      recommendedMemoryRequest: 32Mi
      recommendedCpuLimit: 100m
      recommendedMemoryLimit: 64Mi
    probes:
      liveness:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
      readiness:
        httpGet:
          path: /ready
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10


apiVersion: catalog.bubustack.io/v1alpha1
kind: ImpulseTemplate
metadata:
  name: github-webhook
spec:
  version: 0.1.0
  description: |
    A GitHub webhook impulse that triggers StoryRuns on GitHub events.
    Supports signature validation, event filtering, and session management
    keyed by PR/issue/commit for stateful workflows.
  image: ghcr.io/bubustack/github-webhook-impulse:latest
  supportedModes:
    - deployment

  configSchema:
    type: object
    properties:
      path:
        type: string
        description: HTTP path to listen for webhooks.
        default: /webhook
      
      validateSignature:
        type: boolean
        description: Whether to validate GitHub webhook signatures (recommended for production).
        default: true
      
      eventsAllowlist:
        type: array
        description: |
          List of GitHub event types to accept. If empty, all events are accepted.
          Common events: push, pull_request, issues, issue_comment, release, 
          workflow_run, check_run, deployment, etc.
        items:
          type: string
      
      actionsAllowlist:
        type: array
        description: |
          List of action types to accept (e.g., opened, closed, labeled, synchronize).
          If empty, all actions are accepted.
        items:
          type: string
      
      repositoriesAllowlist:
        type: array
        description: |
          List of repository full names to accept (e.g., "owner/repo").
          If empty, all repositories are accepted.
        items:
          type: string
      
      branchesAllowlist:
        type: array
        description: |
          List of branch names to accept for push/pull_request events.
          Supports glob patterns (e.g., "main", "release/*").
        items:
          type: string
      
      sessionKeyStrategy:
        type: string
        description: |
          Strategy for generating session keys for StoryRun deduplication:
          - auto: Automatically detect based on event type (PR number, issue number, etc.)
          - delivery: Use X-GitHub-Delivery header (unique per webhook)
          - custom: Use a CEL expression from sessionKeyExpression
        enum:
          - auto
          - delivery
          - custom
        default: auto
      
      sessionKeyExpression:
        type: string
        description: |
          CEL expression for custom session key generation.
          Available variables: event (type), action, repository, sender, payload.
          Example: "repository.full_name + '-pr-' + string(payload.pull_request.number)"
      
      policies:
        type: array
        description: |
          Advanced routing policies. Each policy can override the target story
          based on event conditions.
        items:
          type: object
          properties:
            name:
              type: string
              description: Policy name for logging.
              required: true
            events:
              type: array
              description: Events this policy matches.
              items:
                type: string
            actions:
              type: array
              description: Actions this policy matches.
              items:
                type: string
            repositories:
              type: array
              description: Repositories this policy matches.
              items:
                type: string
            branches:
              type: array
              description: Branches this policy matches.
              items:
                type: string
            condition:
              type: string
              description: CEL expression for additional filtering.
            storyName:
              type: string
              description: Override story to trigger for this policy.
            inputsTransform:
              type: object
              description: Additional inputs to merge for this policy.
      
      includeRawPayload:
        type: boolean
        description: Whether to include the full raw payload in StoryRun inputs.
        default: false
      
      startEvents:
        type: array
        description: |
          Events that start a new session (e.g., ["pull_request:opened"]).
          Format: "event_type" or "event_type:action".
        items:
          type: string
      
      endEvents:
        type: array
        description: |
          Events that end a session (e.g., ["pull_request:closed", "pull_request:merged"]).
          Triggers StoryDispatcher.Stop() for graceful cleanup.
        items:
          type: string

  secretSchema:
    webhookSecret:
      description: |
        GitHub webhook secret for signature validation.
        Must contain a 'WEBHOOK_SECRET' key.
      expectedKeys:
        - WEBHOOK_SECRET
      required: false

  execution:
    service:
      ports:
        - name: http
          protocol: TCP
          port: 8080
          targetPort: 8080
        - name: health
          protocol: TCP
          port: 8081
          targetPort: 8081


apiVersion: catalog.bubustack.io/v1alpha1
kind: ImpulseTemplate
metadata:
  name: kubernetes
spec:
  version: 0.1.0
  description: |
    Triggers Stories from Kubernetes cluster activity.
    Supports watching resource changes, cluster events, and more.
    
    Modes:
    - watch: React to resource state changes (Add/Update/Delete)
    - events: React to Kubernetes Event objects (warnings, errors)
  image: ghcr.io/bubustack/kubernetes-impulse:latest
  supportedModes:
    - deployment

  configSchema:
    type: object
    properties:
      mode:
        type: string
        description: Type of Kubernetes activity to watch.
        required: true
        enum:
          - watch
          - events
      
      # ═══════════════════════════════════════════════════════
      # Mode: watch - Resource changes
      # ═══════════════════════════════════════════════════════
      watch:
        type: object
        description: Configuration for 'watch' mode. Watches resource state changes.
        properties:
          resources:
            type: array
            description: Resources to watch.
            items:
              type: object
              properties:
                apiVersion:
                  type: string
                  description: "API version (e.g., v1, apps/v1, bubustack.io/v1alpha1)."
                  required: true
                kind:
                  type: string
                  description: "Resource kind (e.g., Pod, Deployment, Secret)."
                  required: true
                namespace:
                  type: string
                  description: Namespace to watch. Empty means all namespaces.
                labelSelector:
                  type: string
                  description: "Label selector (e.g., 'app=myapp,env=prod')."
                fieldSelector:
                  type: string
                  description: "Field selector (e.g., 'status.phase=Failed')."
          
          triggers:
            type: array
            description: Event types to trigger on.
            items:
              type: string
              enum:
                - Added
                - Modified
                - Deleted
          
          filters:
            type: object
            description: Additional filtering options.
            properties:
              condition:
                type: string
                description: |
                  CEL expression for filtering. Available variables: object, oldObject, eventType.
                  Example: 'object.status.phase == "Failed"'
              debounceSeconds:
                type: integer
                description: Debounce rapid updates for the same resource.
                default: 0
              includeOldObject:
                type: boolean
                description: Include previous state for Modified events.
                default: true
      
      # ═══════════════════════════════════════════════════════
      # Mode: events - Kubernetes Event objects
      # ═══════════════════════════════════════════════════════
      events:
        type: object
        description: Configuration for 'events' mode. Watches Kubernetes Event objects.
        properties:
          namespaces:
            type: array
            description: Namespaces to watch. Empty means all namespaces.
            items:
              type: string
          
          types:
            type: array
            description: Event types to capture.
            items:
              type: string
              enum:
                - Normal
                - Warning
          
          reasons:
            type: array
            description: |
              Filter by event reason. Common values: FailedScheduling, Unhealthy,
              Pulled, Created, Killing, BackOff, FailedMount, NodeNotReady.
            items:
              type: string
          
          involvedObjectKinds:
            type: array
            description: Filter by involved object kind (e.g., Pod, Node, Deployment).
            items:
              type: string
          
          aggregation:
            type: object
            description: Aggregate multiple events before triggering.
            properties:
              enabled:
                type: boolean
                default: false
              windowSeconds:
                type: integer
                description: Time window for aggregation.
                default: 60
              minCount:
                type: integer
                description: Minimum events before triggering.
                default: 1
      
      # ═══════════════════════════════════════════════════════
      # Session key configuration (shared across modes)
      # ═══════════════════════════════════════════════════════
      sessionKey:
        type: object
        description: How to generate session keys for StoryRun deduplication.
        properties:
          strategy:
            type: string
            description: |
              auto: Based on resource namespace/name.
              unique: Unique per event (no deduplication).
              custom: Use CEL expression.
            enum:
              - auto
              - unique
              - custom
            default: auto
          expression:
            type: string
            description: CEL expression for custom session key.

  execution:
    service:
      ports:
        - name: health
          protocol: TCP
          port: 8080
          targetPort: 8080


apiVersion: catalog.bubustack.io/v1alpha1
kind: ImpulseTemplate
metadata:
  name: livekit-webhook
spec:
  version: 1.0.0
  description: An Impulse that listens for LiveKit webhook events and triggers a StoryRun.
  image: ghcr.io/bubustack/livekit-webhook-impulse:latest
  supportedModes:
    - deployment
  configSchema:
    type: object
    properties:
      eventsAllowlist:
        type: array
        description: List of LiveKit events to accept (e.g., participant_joined,
          room_started, track_published).
        items:
          type: string
        default:
          - participant_joined
          - track_published
          - room_started
          - room_finished
          - room_ended
          - participant_left
          - track_unpublished
      selfIdentities:
        type: array
        description: Participant identities to ignore (e.g., agent identities).
        items:
          type: string
        default:
          - bubu-agent
      path:
        type: string
        description: HTTP path to receive webhooks.
        default: /webhook
      startEvents:
        type: array
        description: Events that launch a StoryRun when no active session exists.
        items:
          type: string
        default:
          - participant_joined
          - track_published
      endEvents:
        type: array
        description: Events that terminate the active StoryRun for the room.
        items:
          type: string
        default:
          - room_finished
          - room_ended
          - participant_left
          - track_unpublished
      policies:
        type: array
        description: Optional routing policies that match LiveKit events to stories.
        items:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            storyName:
              type: string
              description: Story to launch when this policy matches. Falls back to Impulse.spec.storyRef when omitted.
            events:
              type: array
              description: Event names to match. Supports `*` or `prefix*` wildcards.
              items:
                type: string
            rooms:
              type: array
              description: Room name filters (exact, `*`, or `prefix*`).
              items:
                type: string
            participants:
              type: array
              description: Participant identity filters (exact, `*`, or `prefix*`).
              items:
                type: string
            storyInputs:
              type: object
              description: Arbitrary JSON forwarded as `policy.inputs` and `policyInputs`.
            metadata:
              type: object
              additionalProperties:
                type: string
              description: Lightweight labels surfaced to the Story as `policy.metadata`.
      includeRawEvent:
        type: boolean
        description: Include the full protobuf webhook payload under `event.raw`. Adds ~1.5KB per trigger.
        default: false

  secretSchema:
    livekitWebhook:
      description: LiveKit webhook signing key/secret.
      expectedKeys:
        - API_KEY
        - API_SECRET
      required: true

  execution:
    service:
      ports:
        - name: http
          protocol: TCP
          port: 80
          targetPort: 8080


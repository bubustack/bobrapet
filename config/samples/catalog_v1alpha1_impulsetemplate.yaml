# Example ImpulseTemplate for webhook triggers
apiVersion: catalog.bubu.sh/v1alpha1
kind: ImpulseTemplate
metadata:
  name: webhook-impulse@v1.0.0
  labels:
    catalog.bubu.sh/category: "triggers"
    catalog.bubu.sh/type: "webhook"
spec:
  version: "1.0.0"
  description: "Generic webhook trigger for receiving HTTP requests and starting workflows"
  triggerType: "webhook"
  
  # Schema for incoming webhook context/payload
  contextSchema:
    type: object
    properties:
      headers:
        type: object
        description: "HTTP headers from the webhook request"
      body:
        type: object
        description: "Request body (JSON)"
      query:
        type: object
        description: "Query parameters"
      method:
        type: string
        description: "HTTP method (GET, POST, etc.)"
      path:
        type: string
        description: "Request path"
  
  # Schema for context mapping configuration
  mappingSchema:
    type: object
    properties:
      inputMapping:
        type: object
        description: "Map webhook context to story inputs"
        additionalProperties: true
      filters:
        type: object
        description: "Filters to apply before triggering"
        properties:
          allowedMethods:
            type: array
            items:
              type: string
          requiredHeaders:
            type: array
            items:
              type: string
  
  # Configuration schema for webhook-specific settings
  configSchema:
    type: object
    properties:
      path:
        type: string
        description: "Webhook endpoint path"
        default: "/webhook"
      methods:
        type: array
        items:
          type: string
          enum: ["GET", "POST", "PUT", "PATCH", "DELETE"]
        default: ["POST"]
      auth:
        type: object
        properties:
          type:
            type: string
            enum: ["none", "bearer", "webhook-secret", "basic", "custom"]
            default: "none"
          secretRef:
            type: string
            description: "Reference to authentication secret"
          header:
            type: string
            description: "Header name for authentication"
      validation:
        type: object
        properties:
          contentTypes:
            type: array
            items:
              type: string
            default: ["application/json"]
          maxBodySize:
            type: string
            default: "10MB"

  uiHints:
    category: "triggers"
    icon: "webhook"
    color: "#4CAF50"
    displayName: "Webhook Trigger"
    tags: ["webhook", "http", "trigger", "api"]
    layout:
      type: "form"
      sections:
        - name: "endpoint"
          title: "Endpoint Configuration"
          fields: ["path", "methods"]
        - name: "security"
          title: "Security"
          fields: ["auth"]
        - name: "validation"
          title: "Request Validation"
          fields: ["validation"]

  defaults:
    path: "/webhook"
    methods: ["POST"]
    auth:
      type: "none"
    validation:
      contentTypes: ["application/json"]
      maxBodySize: "10MB"

  examples:
    - name: "github-webhook"
      description: "GitHub webhook for CI/CD pipeline"
      config:
        path: "/webhooks/github"
        methods: ["POST"]
        auth:
          type: "webhook-secret"
          secretRef: "github-webhook-secret"
          header: "X-Hub-Signature-256"
        validation:
          contentTypes: ["application/json"]
      input:
        headers:
          X-GitHub-Event: "push"
          X-Hub-Signature-256: "sha256=..."
        body:
          repository:
            name: "my-repo"
          ref: "refs/heads/main"
      output:
        repository: "my-repo"
        branch: "main"
        event: "push"

    - name: "simple-webhook"
      description: "Simple webhook with no authentication"
      config:
        path: "/api/trigger"
        methods: ["POST", "PUT"]
        auth:
          type: "none"
      input:
        body:
          action: "process"
          data: {}
      output:
        action: "process"
        data: {}

  image: "ghcr.io/bubustack/impulse-webhook:v1.0.0"

  resources:
    cpu: "100m"
    memory: "128Mi"
    nodeSelector:
      kubernetes.io/arch: "amd64"

  security:
    requiredSecrets: []
    networkAccess: ["external"]
    privilegedAccess: false

  engine:
    supportedModes: ["webhook", "deployment"]
    defaultMode: "webhook"
    supportsHA: true
    supportsScaling: true
    networkRequirements:
      externalAccess: true
      requiredPorts:
        - name: "http"
          port: 8080
          protocol: "TCP"
          required: true
      protocols: ["HTTP", "HTTPS"]

---
# Example ImpulseTemplate for cron triggers
apiVersion: catalog.bubu.sh/v1alpha1
kind: ImpulseTemplate
metadata:
  name: cron-impulse
  labels:
    catalog.bubu.sh/category: "triggers"
    catalog.bubu.sh/type: "schedule"
spec:
  version: "1.0.0"
  description: "Cron-based scheduler for time-triggered workflows"
  triggerType: "cron"
  
  contextSchema:
    type: object
    properties:
      triggerTime:
        type: string
        format: "date-time"
        description: "When the trigger fired"
      scheduledTime:
        type: string
        format: "date-time"
        description: "When the trigger was scheduled to fire"
      cronExpression:
        type: string
        description: "The cron expression that triggered this"
  
  configSchema:
    type: object
    required: ["schedule"]
    properties:
      schedule:
        type: string
        description: "Cron expression (e.g., '0 8 * * *')"
        pattern: "^[0-9*,-/]+ [0-9*,-/]+ [0-9*,-/]+ [0-9*,-/]+ [0-9*,-/]+$"
      timezone:
        type: string
        description: "Timezone for the schedule"
        default: "UTC"
      runOnStartup:
        type: boolean
        description: "Run immediately when impulse is created"
        default: false
      maxMissed:
        type: integer
        description: "Maximum missed runs to catch up"
        default: 1

  uiHints:
    category: "triggers"
    icon: "schedule"
    color: "#FF9800"
    displayName: "Cron Schedule"
    tags: ["cron", "schedule", "timer", "recurring"]

  defaults:
    timezone: "UTC"
    runOnStartup: false
    maxMissed: 1

  examples:
    - name: "daily-report"
      description: "Generate daily report at 8 AM"
      config:
        schedule: "0 8 * * *"
        timezone: "America/New_York"
        runOnStartup: false

    - name: "hourly-cleanup"
      description: "Cleanup tasks every hour"
      config:
        schedule: "0 * * * *"
        timezone: "UTC"

  image: "ghcr.io/bubustack/impulse-cron:v1.0.0"

  resources:
    cpu: "50m"
    memory: "64Mi"

  security:
    requiredSecrets: []
    networkAccess: ["internal"]
    privilegedAccess: false

  engine:
    supportedModes: ["job", "deployment"]
    defaultMode: "deployment"
    supportsHA: false
    supportsScaling: false
    networkRequirements:
      externalAccess: false
      protocols: []
# Cleaner Schema Examples
# Shows the improved approach: required: true on each property instead of separate required arrays

---
# Story with cleaner input schema
apiVersion: bubu.sh/v1alpha1
kind: Story
metadata:
  name: telegram-assistant
spec:
  # Cleaner input schema - no separate required array
  inputs:
    properties:
      message:
        type: json
        description: "Telegram message object"
        required: true                    # Clear and obvious
      user_id:
        type: string
        description: "Telegram user ID"
        required: true                    # Right where you need it
      chat_id:
        type: string
        description: "Telegram chat ID" 
        required: true
      message_type:
        type: string
        enum: ["text", "voice", "photo"]
        description: "Type of message received"
        required: true
      context:
        type: object
        description: "Additional context information"
        # required: false (optional, default)
      debug_mode:
        type: boolean
        default: false
        description: "Enable debug logging"
        # required: false (optional)

  steps:
    - name: validate-input
      type: condition
      if: ".inputs.message != null && .inputs.user_id != null"
      then:
        - name: process-message
          ref: "message-processor"

---
# EngramTemplate with cleaner schemas
apiVersion: catalog.bubu.sh/v1alpha1
kind: EngramTemplate
metadata:
  name: message-processor
spec:
  version: "2.0.0"
  description: "Message processor with cleaner schema definition"
  supportedModes: ["job", "deployment"]
  
  # Input schema - cleaner approach
  inputSchema:
    type: object
    properties:
      message:
        type: string
        description: "Message content to process"
        required: true                    # Inline requirement
      language:
        type: string
        enum: ["en", "es", "fr", "de"]
        default: "en"
        description: "Message language"
        # required: false (optional with default)
      processing_mode:
        type: string
        enum: ["fast", "accurate", "balanced"]
        default: "balanced"
        description: "Processing quality vs speed"
      max_length:
        type: integer
        minimum: 10
        maximum: 10000
        default: 1000
        description: "Maximum response length"
      user_context:
        type: object
        description: "User-specific context"
        properties:
          user_id:
            type: string
            required: true                # Nested required fields
          preferences:
            type: object
            description: "User preferences"
            # required: false (optional nested object)
  
  # Output schema - also cleaner
  outputSchema:
    type: object
    properties:
      processed_message:
        type: string
        description: "Processed message content"
        required: true                    # Must be returned
      confidence_score:
        type: number
        minimum: 0
        maximum: 1
        description: "Processing confidence"
        required: true                    # Always provided
      detected_language:
        type: string
        description: "Detected message language"
        # required: false (optional)
      processing_time:
        type: number
        description: "Processing time in seconds"
        # required: false (optional metadata)
      suggestions:
        type: array
        items: {type: string}
        description: "Suggested follow-up actions"
        # required: false (optional)
  
  # Configuration schema - cleaner
  configSchema:
    type: object
    properties:
      api_endpoint:
        type: string
        format: uri
        description: "Processing API endpoint"
        required: true                    # Must be configured
      api_key_secret:
        type: string
        description: "Secret containing API key"
        required: true                    # Must be configured
      timeout:
        type: string
        default: "30s"
        pattern: "^[0-9]+(s|m|h)$"
        description: "Request timeout"
        # required: false (has default)
      retry_attempts:
        type: integer
        minimum: 0
        maximum: 10
        default: 3
        description: "Number of retry attempts"
        # required: false (has default)
      enable_caching:
        type: boolean
        default: true
        description: "Enable response caching"
        # required: false (has default)

  image: "ghcr.io/bubustack/message-processor:v2.0.0"

---
# ImpulseTemplate with cleaner schemas
apiVersion: catalog.bubu.sh/v1alpha1
kind: ImpulseTemplate
metadata:
  name: webhook-trigger
spec:
  version: "1.0.0"
  description: "Webhook trigger with cleaner schema definition"
  supportedModes: ["deployment"]
  
  # Context schema - what the trigger receives
  contextSchema:
    type: object
    properties:
      headers:
        type: object
        description: "HTTP request headers"
        required: true                    # Always provided by webhook
      body:
        type: object
        description: "HTTP request body"
        required: true                    # Always provided
      method:
        type: string
        enum: ["GET", "POST", "PUT", "PATCH", "DELETE"]
        description: "HTTP method used"
        required: true                    # Always known
      path:
        type: string
        description: "Request path"
        required: true                    # Always known
      query:
        type: object
        description: "Query parameters"
        # required: false (may be empty)
      client_ip:
        type: string
        format: ipv4
        description: "Client IP address"
        # required: false (may not be available)
  
  # Mapping schema - how context maps to story inputs
  mappingSchema:
    type: object
    properties:
      story_input_mapping:
        type: object
        description: "Maps context fields to story inputs"
        required: true                    # Must define mapping
        properties:
          message:
            type: string
            description: "CEL expression to extract message"
            required: true                # Core mapping
          user_id:
            type: string
            description: "CEL expression to extract user ID"
            required: true                # Core mapping
          metadata:
            type: object
            description: "Additional metadata mapping"
            # required: false (optional extras)
      filters:
        type: object
        description: "Filtering rules"
        properties:
          allowed_methods:
            type: array
            items: {type: string}
            default: ["POST"]
            description: "Allowed HTTP methods"
          required_headers:
            type: array
            items: {type: string}
            description: "Required HTTP headers"
            # required: false (optional filtering)
  
  # Configuration schema - webhook-specific config
  configSchema:
    type: object
    properties:
      webhook_path:
        type: string
        pattern: "^/.*"
        default: "/webhook"
        description: "Webhook endpoint path"
        required: true                    # Must be configured
      port:
        type: integer
        minimum: 1
        maximum: 65535
        default: 8080
        description: "Port to listen on"
        # required: false (has default)
      auth_type:
        type: string
        enum: ["none", "bearer", "webhook-secret", "basic"]
        default: "none"
        description: "Authentication method"
        # required: false (has default)
      auth_secret:
        type: string
        description: "Secret name for authentication"
        # required: false (depends on auth_type)
      max_request_size:
        type: string
        pattern: "^[0-9]+(B|KB|MB|GB)$"
        default: "10MB"
        description: "Maximum request body size"
        # required: false (has default)
      cors_enabled:
        type: boolean
        default: false
        description: "Enable CORS support"
        # required: false (has default)
      cors_origins:
        type: array
        items: {type: string}
        description: "Allowed CORS origins"
        # required: false (only if CORS enabled)

  image: "ghcr.io/bubustack/webhook-trigger:v1.0.0"

---
# Impulse using the cleaner template (minimal config)
apiVersion: bubu.sh/v1alpha1
kind: Impulse
metadata:
  name: github-webhook
spec:
  storyRef: "ci-cd-pipeline"
  
  # Simple, clear mapping
  mapping:
    repository: "context.body.repository.name"
    branch: "context.body.ref | split('/') | last"
    commit: "context.body.head_commit.id"
    author: "context.body.head_commit.author.name"
  
  engine:
    mode: "deployment"
    templateRef: "webhook-trigger"
  
  # Only specify required fields (template provides intelligent defaults)
  with:
    webhook_path: "/webhooks/github"     # Required by template
    auth_type: "webhook-secret"          # Override default ("none")
    auth_secret: "github-webhook-secret" # Required when using webhook-secret
    # Other fields use template defaults

---
# COMPARISON: Old vs New Schema Approach

# OLD APPROACH (verbose, error-prone):
# inputSchema:
#   type: object
#   required: ["message", "user_id", "processing_mode"]  # Separate list to maintain
#   properties:
#     message:
#       type: string
#       description: "Message content"
#     user_id:
#       type: string
#       description: "User identifier"
#     processing_mode:
#       type: string
#       description: "How to process"
#     optional_field:
#       type: string
#       description: "Optional parameter"

# NEW APPROACH (clean, intuitive):
# inputSchema:
#   type: object
#   properties:
#     message:
#       type: string
#       description: "Message content"
#       required: true                    # Clear and obvious
#     user_id:
#       type: string
#       description: "User identifier"
#       required: true                    # Right where you need it
#     processing_mode:
#       type: string
#       description: "How to process"
#       required: true                    # Self-documenting
#     optional_field:
#       type: string
#       description: "Optional parameter"
#       # required: false (default - clearly optional)

# BENEFITS OF NEW APPROACH:
# ✅ More intuitive - each property declares its own requirements
# ✅ Easier maintenance - no separate array to keep in sync
# ✅ Less error-prone - can't forget to update the required array
# ✅ Better readability - everything about a property is in one place
# ✅ Self-documenting - clear at a glance what's required vs optional

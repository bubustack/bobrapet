# This example showcases the DOTADIW principle with consistent engine configuration
# Both Impulses and Engrams now use the same "engine" + "with" pattern

---
# Example: HTTP Impulse with consistent engine configuration
apiVersion: bubu.sh/v1alpha1
kind: Impulse
metadata:
  name: api-webhook
spec:
  storyRef: process-api-request
  contextMapping:
    user_id: "request.headers['X-User-ID']"
    payload: "request.body"
  
  # ✅ Engine - HOW to run this impulse
  engine:
    mode: container
    image: "ghcr.io/bubustack/impulse-http:v1.0.0"
    resources:
      cpu: "200m"
      memory: "256Mi"
      replicas: 2
  
  # ✅ With - WHAT this impulse should do (type-specific config)
  with:
    path: "/api/webhooks/events"
    method: "POST"
    auth:
      type: "jwt"
      secret: "api-jwt-keys"
    rateLimit:
      requests: 100
      window: "1m"

---
# Example: LLM Engram with consistent engine configuration  
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: text-analyzer
spec:
  # ✅ Engine - HOW to run this engram
  engine:
    mode: container
    image: "ghcr.io/bubustack/engram-openai:v1.0.0"
    resources:
      cpu: "500m"
      memory: "1Gi"
  
  # ✅ With - WHAT this engram should do (type-specific config)
  with:
    model: "gpt-4"
    temperature: 0.3
    maxTokens: 1000
    template: |
      Analyze the following text for sentiment and key topics:
      
      Text: {{ .input.text }}
      
      Return a JSON response with:
      - sentiment: positive/negative/neutral
      - confidence: 0.0-1.0
      - topics: array of key topics
      - summary: brief summary
    secrets:
      apiKey: "openai-api-key"
  
  security:
    requiredSecrets: ["openai-api-key"]
    networkPolicy: "allow-egress"

---
# Example: Story using both (showing the consistency)
apiVersion: bubu.sh/v1alpha1
kind: Story
metadata:
  name: process-api-request
spec:
  inputs:
    user_id: { type: string, required: true }
    payload: { type: object, required: true }
  
  steps:
    # Step 1: Analyze the incoming text using our LLM engram
    - name: analyze-text
      ref: text-analyzer  # ← Points to the engram above
      with:
        text: "{{ .payload.message }}"
    
    # Step 2: Route based on sentiment
    - name: route-by-sentiment
      type: switch
      cases:
        - when: "analyze-text.output.sentiment == 'negative'"
          steps:
            - name: escalate-to-human
              ref: create-support-ticket
              with:
                priority: "high"
                message: "{{ .payload.message }}"
                analysis: "{{ analyze-text.output }}"
        
        - when: "analyze-text.output.sentiment == 'positive'"
          steps:
            - name: auto-respond
              ref: send-email
              with:
                template: "positive-response"
                to: "{{ .user_id }}"
                data: "{{ analyze-text.output }}"
      
      default:
        - name: standard-processing
          ref: process-neutral-message
          with:
            message: "{{ .payload.message }}"
            analysis: "{{ analyze-text.output }}"

---
# Example: Different engine modes showcase

# GRPC-based impulse (external service integration)
apiVersion: bubu.sh/v1alpha1
kind: Impulse
metadata:
  name: external-event-source
spec:
  storyRef: handle-external-event
  
  # ✅ Engine - connects to external GRPC service
  engine:
    mode: grpc
    serviceRef: "event-service.external.svc.cluster.local:9090"
  
  # ✅ With - how to consume from that service
  with:
    subscription: "workflow-events"
    batchSize: 10
    ackTimeout: "30s"

---
# Webhook-based impulse (registers with external system)
apiVersion: bubu.sh/v1alpha1  
kind: Impulse
metadata:
  name: ci-cd-integration
spec:
  storyRef: handle-deployment-event
  
  # ✅ Engine - registers webhook with external system
  engine:
    mode: webhook
    endpoint: "https://ci-system.company.com/api/webhooks"
  
  # ✅ With - what webhook to register
  with:
    events: ["deployment.success", "deployment.failure", "test.complete"]
    callbackUrl: "https://bobrapet.company.com/api/impulses/ci-cd-integration/webhook"
    auth:
      type: "oauth2"
      clientId: "bobrapet-client"
      secret: "oauth-credentials"

---
# High-performance pooled engram
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: image-processor
spec:
  # ✅ Engine - pooled mode for high throughput
  engine:
    mode: pooled
    image: "ghcr.io/bubustack/engram-vision:v1.0.0"
    pool:
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilization: 70
    resources:
      cpu: "2"
      memory: "4Gi"
      gpu: "1"
  
  # ✅ With - image processing configuration
  with:
    model: "yolo-v8"
    confidence: 0.8
    outputFormat: "json"
    classes: ["person", "car", "bicycle", "dog", "cat"]
    preprocessing:
      resize: [640, 640]
      normalize: true

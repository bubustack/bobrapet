# Enhanced Impulse examples using the new consistent architecture
# These examples show how Impulses now match the sophistication of Engrams

---
# GitHub Webhook Impulse with enhanced configuration
apiVersion: bubu.sh/v1alpha1
kind: Impulse
metadata:
  name: github-ci-webhook
  annotations:
    catalog.bubu.sh/template: "webhook-impulse"
    catalog.bubu.sh/version: "1.0.0"
spec:
  storyRef: "ci-cd-pipeline"
  
  # Schema definitions (matching Engram pattern)
  contextSchema:
    type: object
    properties:
      repository:
        type: object
        properties:
          name:
            type: string
          full_name:
            type: string
      ref:
        type: string
      head_commit:
        type: object
  
  mappingSchema:
    type: object
    properties:
      repository:
        type: string
      branch:
        type: string
      commit:
        type: string
  
  # Context mapping to story inputs
  mapping:
    repository: "context.body.repository.name"
    branch: "context.body.ref | split('/') | last"
    commit: "context.body.head_commit.id"
    author: "context.body.head_commit.author.name"
    event_type: "context.headers['X-GitHub-Event']"
  
  # Enhanced engine configuration
  engine:
    mode: "webhook"
    templateRef: "webhook-impulse"
    webhook:
      path: "/webhooks/github"
      methods: ["POST"]
      auth:
        type: "webhook-secret"
        secretRef: "github-webhook-secret"
        header: "X-Hub-Signature-256"
      validation:
        contentTypes: ["application/json"]
        maxBodySize: "5MB"
        schema:
          type: object
          required: ["repository", "ref"]
  
  # Enhanced resource management (matching Engram pattern)
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
      ephemeralStorage: "1Gi"
    limits:
      cpu: "500m"
      memory: "256Mi"
      ephemeralStorage: "2Gi"
      maxRequestSize: "10MB"
      maxConcurrentConns: 100
      maxRequestsPerSecond: 50
    minReplicas: 2
    maxReplicas: 10
    maxConcurrentTriggers: 100
    nodeSelector:
      kubernetes.io/os: "linux"
    tolerations:
      - "webhook-nodes"
  
  # Retry and timeout policies (matching Engram pattern)
  retry:
    maxRetries: 3
    backoff: "exponential"
    baseDelay: "1s"
    maxDelay: "30s"
  timeout: "30s"
  
  # Security configuration (matching Engram pattern)
  security:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    requiredSecrets: ["github-webhook-secret"]
    networkPolicy: "restricted"
    allowedOrigins: ["https://github.com"]
    requireHTTPS: true
  
  # Configuration for this specific instance
  with:
    events: ["push", "pull_request"]
    branches: ["main", "develop", "release/*"]
    skipDrafts: true
    validateSignature: true

---
# Kafka Consumer Impulse with deployment mode
apiVersion: bubu.sh/v1alpha1
kind: Impulse
metadata:
  name: order-processor
  annotations:
    catalog.bubu.sh/template: "kafka-impulse"
spec:
  storyRef: "process-order"
  
  contextSchema:
    type: object
    properties:
      topic:
        type: string
      partition:
        type: integer
      offset:
        type: integer
      key:
        type: string
      value:
        type: object
  
  mapping:
    order_id: "context.value.order_id"
    customer_id: "context.value.customer_id"
    items: "context.value.items"
    total: "context.value.total"
    metadata:
      topic: "context.topic"
      partition: "context.partition"
      offset: "context.offset"
  
  engine:
    mode: "deployment"
    templateRef: "kafka-impulse"
    deployment:
      minReplicas: 3
      maxReplicas: 10
      idleTimeout: "5m"
  
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
    minReplicas: 3
    maxReplicas: 10
    maxConcurrentTriggers: 50
    maxExecutionTime: "5m"
  
  retry:
    maxRetries: 5
    backoff: "exponential"
    baseDelay: "2s"
    maxDelay: "60s"
  timeout: "5m"
  
  security:
    runAsNonRoot: true
    requiredSecrets: ["kafka-credentials"]
    networkPolicy: "internal"
  
  with:
    brokers: ["kafka-cluster-1:9092", "kafka-cluster-2:9092", "kafka-cluster-3:9092"]
    topic: "orders"
    group: "order-processors"
    autoOffsetReset: "earliest"
    maxPollRecords: 10
    enableAutoCommit: false
    securityProtocol: "SASL_SSL"
    saslMechanism: "SCRAM-SHA-256"

---
# Scheduled Impulse with enhanced configuration
apiVersion: bubu.sh/v1alpha1
kind: Impulse
metadata:
  name: daily-analytics-report
  annotations:
    catalog.bubu.sh/template: "cron-impulse"
spec:
  storyRef: "generate-analytics-report"
  
  contextSchema:
    type: object
    properties:
      triggerTime:
        type: string
        format: "date-time"
      scheduledTime:
        type: string
        format: "date-time"
      reportDate:
        type: string
        format: "date"
  
  mapping:
    report_date: "context.reportDate"
    trigger_time: "context.triggerTime"
    department: "all"
    format: "pdf"
  
  engine:
    mode: "job"
    templateRef: "cron-impulse"
  
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
    maxExecutionTime: "10m"
  
  retry:
    maxRetries: 2
    backoff: "fixed"
    baseDelay: "5m"
  timeout: "10m"
  
  security:
    runAsNonRoot: true
    networkPolicy: "internal"
  
  with:
    schedule: "0 8 * * *"  # Every day at 8 AM
    timezone: "America/New_York"
    runOnStartup: false
    maxMissed: 1
    concurrencyPolicy: "Forbid"  # Don't run if previous execution is still running

---
# File Watcher Impulse (new type)
apiVersion: bubu.sh/v1alpha1
kind: Impulse
metadata:
  name: document-processor
  annotations:
    catalog.bubu.sh/template: "file-watcher-impulse"
spec:
  storyRef: "process-uploaded-document"
  
  contextSchema:
    type: object
    properties:
      fileName:
        type: string
      filePath:
        type: string
      fileSize:
        type: integer
      mimeType:
        type: string
      eventType:
        type: string
        enum: ["created", "modified", "deleted"]
  
  mapping:
    file_name: "context.fileName"
    file_path: "context.filePath"
    file_size: "context.fileSize"
    mime_type: "context.mimeType"
    event_type: "context.eventType"
  
  engine:
    mode: "deployment"
    templateRef: "file-watcher-impulse"
    deployment:
      minReplicas: 1
      maxReplicas: 3
  
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
    maxConcurrentTriggers: 20
  
  security:
    runAsNonRoot: true
    requiredSecrets: ["storage-credentials"]
  
  with:
    watchPath: "/mnt/uploads"
    events: ["created", "modified"]
    extensions: [".pdf", ".docx", ".txt", ".md"]
    recursive: true
    debounceInterval: "5s"  # Wait 5s after last change before triggering

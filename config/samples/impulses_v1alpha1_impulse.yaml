apiVersion: bubu.sh/v1alpha1
kind: Impulse
metadata:
  name: lead-capture
spec:
  storyRef: onboarding-flow
  contextMapping:
    message: "request.body.message"
    emails: "[request.body.email]"
  # Engine configuration - how to run this impulse
  engine:
    mode: container
    image: "ghcr.io/bubustack/impulse-http:v1.0.0"
    resources:
      cpu: "100m"
      memory: "128Mi"
      replicas: 2
  # Generic configuration - interpreted by the HTTP impulse container
  with:
    path: "/api/v1/capture"
    method: "POST"
    auth:
      type: "apiKey"
      secret: "api-keys"
      header: "X-API-Key"
    cors:
      enabled: true
      origins: ["https://myapp.com"]
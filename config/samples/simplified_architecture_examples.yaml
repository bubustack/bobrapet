# Simplified Architecture Examples
# Shows how Impulses and Engrams are now very similar - both just containerized components

---
# Impulse: Always-running trigger listening for events
apiVersion: bubu.sh/v1alpha1
kind: Impulse
metadata:
  name: github-webhook
spec:
  storyRef: "ci-cd-pipeline"
  
  # Context mapping from trigger to story inputs (delegated to container)
  mapping:
    repository: "context.body.repository.name"
    branch: "context.body.ref | split('/') | last"
    commit: "context.body.head_commit.id"
  
  # Engine configuration - simple and similar to Engrams
  engine:
    mode: "deployment"                    # Always running (only mode for Impulses)
    templateRef: "webhook-impulse"        # References template for image
    deployment:
      minReplicas: 2
      maxReplicas: 5
  
  # Resource configuration - same structure as Engrams
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
    maxConcurrentInstances: 10
  
  # Container-specific configuration via 'with'
  with:
    webhook_path: "/webhooks/github"
    port: 8080
    auth_secret: "github-webhook-secret"

---
# Engram: Task execution component (similar structure to Impulse)
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: openai-gpt-4
spec:
  # Engine configuration - similar to Impulses
  engine:
    mode: "job"                          # Job mode for task execution
    templateRef: "openai-llm"            # References template for image
    deployment:                          # Can also use deployment mode
      minReplicas: 1
      maxReplicas: 3
  
  # Resource configuration - identical structure to Impulses
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
    maxConcurrentInstances: 5
  
  # Container-specific configuration via 'with'
  with:
    model: "gpt-4"
    max_tokens: 2000
    api_key_secret: "openai-api-key"

---
# Another Impulse: Kafka consumer (shows consistency)
apiVersion: bubu.sh/v1alpha1
kind: Impulse
metadata:
  name: order-processor
spec:
  storyRef: "process-order"
  
  mapping:
    order_id: "context.value.order_id"
    customer_id: "context.value.customer_id"
  
  engine:
    mode: "deployment"                   # Always running
    templateRef: "kafka-impulse"
    deployment:
      minReplicas: 3
      maxReplicas: 10
  
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
    maxConcurrentInstances: 50
  
  with:
    brokers: ["kafka-cluster:9092"]
    topic: "orders"
    group: "order-processors"

---
# Another Engram: Database query (shows consistency)
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: postgres-query
spec:
  engine:
    mode: "deployment"                   # Can be deployment for persistent connections
    templateRef: "database-client"
    deployment:
      minReplicas: 2
      maxReplicas: 8
  
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
    maxConcurrentInstances: 20
  
  with:
    database_url_secret: "postgres-credentials"
    connection_pool_size: 10
    query_timeout: "30s"

---
# Simple cron Impulse
apiVersion: bubu.sh/v1alpha1
kind: Impulse
metadata:
  name: daily-backup
spec:
  storyRef: "backup-databases"
  
  mapping:
    backup_date: "context.triggerTime | date('2006-01-02')"
  
  engine:
    mode: "deployment"
    templateRef: "cron-impulse"
  
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
  
  with:
    schedule: "0 2 * * *"    # 2 AM daily
    timezone: "UTC"

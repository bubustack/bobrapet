# Template Examples showing supported modes
# Templates specify which execution modes they support

---
# Job-only Engram Template (AI inference, data processing)
apiVersion: catalog.bubu.sh/v1alpha1
kind: EngramTemplate
metadata:
  name: openai-gpt-inference
spec:
  version: "1.0.0"
  description: "OpenAI GPT inference - designed for one-shot processing"
  
  # Only supports job mode - doesn't make sense as persistent service
  supportedModes: ["job"]
  
  inputSchema:
    type: object
    required: ["prompt"]
    properties:
      prompt:
        type: string
      model:
        type: string
        enum: ["gpt-4", "gpt-4-turbo", "gpt-3.5-turbo"]
  
  outputSchema:
    type: object
    properties:
      response:
        type: string
      usage:
        type: object
  
  image: "ghcr.io/bubustack/engram-openai-inference:v1.0.0"
  
  uiHints:
    category: "ai"
    displayName: "OpenAI GPT (Job Mode)"
    icon: "brain"

---
# Deployment-only Engram Template (database connection pool)
apiVersion: catalog.bubu.sh/v1alpha1
kind: EngramTemplate
metadata:
  name: postgres-connection-pool
spec:
  version: "1.0.0"
  description: "PostgreSQL connection pool - requires persistent connections"
  
  # Only supports deployment - needs persistent connections
  supportedModes: ["deployment"]
  
  inputSchema:
    type: object
    required: ["query"]
    properties:
      query:
        type: string
      parameters:
        type: array
  
  outputSchema:
    type: object
    properties:
      rows:
        type: array
      count:
        type: integer
  
  image: "ghcr.io/bubustack/engram-postgres-pool:v1.0.0"
  
  uiHints:
    category: "database"
    displayName: "PostgreSQL Pool (Deployment Mode)"
    icon: "database"

---
# StatefulSet-only Engram Template (distributed cache coordinator)
apiVersion: catalog.bubu.sh/v1alpha1
kind: EngramTemplate
metadata:
  name: redis-cluster-coordinator
spec:
  version: "1.0.0"
  description: "Redis cluster coordinator - requires stable identity and persistent storage"
  
  # Only supports statefulset - needs stable network identity
  supportedModes: ["statefulset"]
  
  inputSchema:
    type: object
    properties:
      operation:
        type: string
        enum: ["get", "set", "delete", "cluster_info"]
      key:
        type: string
      value:
        type: string
  
  image: "ghcr.io/bubustack/engram-redis-coordinator:v1.0.0"
  
  uiHints:
    category: "cache"
    displayName: "Redis Cluster (StatefulSet Mode)"
    icon: "cluster"

---
# Multi-mode Engram Template (HTTP client - flexible)
apiVersion: catalog.bubu.sh/v1alpha1
kind: EngramTemplate
metadata:
  name: http-client
spec:
  version: "1.0.0"
  description: "HTTP client - can work in any mode depending on use case"
  
  # Supports all modes - flexible based on requirements
  supportedModes: ["job", "deployment", "statefulset"]
  
  inputSchema:
    type: object
    required: ["url", "method"]
    properties:
      url:
        type: string
      method:
        type: string
        enum: ["GET", "POST", "PUT", "DELETE"]
      headers:
        type: object
      body:
        type: string
  
  outputSchema:
    type: object
    properties:
      status_code:
        type: integer
      headers:
        type: object
      body:
        type: string
  
  image: "ghcr.io/bubustack/engram-http-client:v1.0.0"
  
  uiHints:
    category: "network"
    displayName: "HTTP Client (All Modes)"
    icon: "http"

---
# Deployment-only Impulse Template (stateless webhook)
apiVersion: catalog.bubu.sh/v1alpha1
kind: ImpulseTemplate
metadata:
  name: webhook-impulse
spec:
  version: "1.0.0"
  description: "Stateless webhook receiver"
  
  # Only deployment mode - webhooks are typically stateless
  supportedModes: ["deployment"]
  
  contextSchema:
    type: object
    properties:
      headers:
        type: object
      body:
        type: object
      method:
        type: string
  
  image: "ghcr.io/bubustack/impulse-webhook:v1.0.0"
  
  uiHints:
    category: "triggers"
    displayName: "Webhook (Stateless)"
    icon: "webhook"

---
# StatefulSet-only Impulse Template (Kafka consumer)
apiVersion: catalog.bubu.sh/v1alpha1
kind: ImpulseTemplate
metadata:
  name: kafka-consumer
spec:
  version: "1.0.0"
  description: "Kafka consumer with partition affinity and offset management"
  
  # Only statefulset mode - needs partition assignment and offset storage
  supportedModes: ["statefulset"]
  
  contextSchema:
    type: object
    properties:
      topic:
        type: string
      partition:
        type: integer
      offset:
        type: integer
      key:
        type: string
      value:
        type: object
  
  image: "ghcr.io/bubustack/impulse-kafka-consumer:v1.0.0"
  
  uiHints:
    category: "messaging"
    displayName: "Kafka Consumer (Stateful)"
    icon: "kafka"

---
# Multi-mode Impulse Template (file watcher)
apiVersion: catalog.bubu.sh/v1alpha1
kind: ImpulseTemplate
metadata:
  name: file-watcher
spec:
  version: "1.0.0"
  description: "File system watcher - can be stateless or stateful"
  
  # Supports both modes depending on requirements
  supportedModes: ["deployment", "statefulset"]
  # deployment: for simple file watching
  # statefulset: for tracking file change history
  
  contextSchema:
    type: object
    properties:
      file_path:
        type: string
      event_type:
        type: string
        enum: ["created", "modified", "deleted"]
      file_size:
        type: integer
  
  image: "ghcr.io/bubustack/impulse-file-watcher:v1.0.0"
  
  uiHints:
    category: "filesystem"
    displayName: "File Watcher (Flexible)"
    icon: "folder"

---
# Example Engram using job-only template
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: document-analysis
spec:
  engine:
    mode: "job"                         # Valid - template supports job mode
    templateRef: "openai-gpt-inference"
  
  with:
    model: "gpt-4"
    max_tokens: 2000


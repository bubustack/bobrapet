---
# Example Impulse using statefulset template
apiVersion: bubu.sh/v1alpha1
kind: Impulse
metadata:
  name: order-stream-processor
spec:
  storyRef: "process-order"
  
  engine:
    mode: "statefulset"                 # Valid - template supports statefulset
    templateRef: "kafka-consumer"
    deployment:
      minReplicas: 3
      statefulSet:
        serviceName: "kafka-consumer-svc"
        volumeClaimTemplates:
          - name: "offset-storage"
            size: "1Gi"
  
  with:
    topic: "orders"
    group: "order-processors"

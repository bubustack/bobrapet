# Unified Configuration Examples
# Shows how Engrams and Impulses now have consistent configuration
# Focuses on essential Kubernetes fields that users actually want to configure

---
# Job Mode Engram (AI inference) - Essential fields only
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: document-analyzer
spec:
  engine:
    mode: "job"
    templateRef: "openai-gpt-inference"
    workload:
      # Job-specific fields (from Kubernetes Job API)
      parallelism: 3                    # Max pods running simultaneously
      completions: 1                    # Desired successful completions
      job:
        backoffLimit: 2                 # Retries before considering failed
        completionMode: "NonIndexed"    # How completion is tracked
        ttlSecondsAfterFinished: 3600   # Cleanup after 1 hour
      
      # Lifecycle management
      activeDeadlineSeconds: 1800       # Max 30 minutes to complete
  
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
  
  with:
    model: "gpt-4"
    max_tokens: 2000

---
# Deployment Mode Engram (API service) - Essential fields only
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: translation-service
spec:
  engine:
    mode: "deployment"
    templateRef: "translation-api"
    workload:
      # Deployment-specific fields (from Kubernetes Deployment API)
      replicas: 3
      
      # Update strategy (essential for production)
      updateStrategy:
        type: "RollingUpdate"
        rollingUpdate:
          maxUnavailable: "25%"         # Max pods unavailable during update
          maxSurge: "25%"               # Max additional pods during update
  
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
    maxConcurrentInstances: 10
  
  with:
    api_endpoint: "https://translate.googleapis.com/translate/v2"
    supported_languages: ["en", "es", "fr", "de"]

---
# StatefulSet Mode Engram (Cache cluster) - Essential fields only
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: redis-cluster
spec:
  engine:
    mode: "statefulset"
    templateRef: "redis-cluster-node"
    workload:
      # StatefulSet-specific fields (from Kubernetes StatefulSet API)
      replicas: 3
      
      # Update strategy
      updateStrategy:
        type: "RollingUpdate"
        rollingUpdate:
          maxUnavailable: 1             # Update one pod at a time
      
      # StatefulSet configuration (essential fields)
      statefulSet:
        serviceName: "redis-cluster-svc"        # Required for StatefulSet
        podManagementPolicy: "OrderedReady"     # Sequential startup
        volumeClaimTemplates:
          - name: "redis-data"
            size: "10Gi"
            storageClass: "fast-ssd"
            accessModes: ["ReadWriteOnce"]
  
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "1000m"
      memory: "4Gi"
  
  with:
    cluster_mode: true
    max_memory: "1536mb"
    save_interval: "900 1"

---
# Deployment Mode Impulse (Webhook) - Same structure as Engrams
apiVersion: bubu.sh/v1alpha1
kind: Impulse
metadata:
  name: github-webhook
spec:
  storyRef: "ci-cd-pipeline"
  
  # Context mapping (Impulse-specific)
  mapping:
    repository: "context.body.repository.name"
    branch: "context.body.ref | split('/') | last"
  
  # Engine configuration - IDENTICAL to Engrams
  engine:
    mode: "deployment"
    templateRef: "webhook-impulse"
    workload:
      replicas: 2
      updateStrategy:
        type: "RollingUpdate"
        rollingUpdate:
          maxUnavailable: "50%"
          maxSurge: "50%"
  
  # Resource configuration - IDENTICAL to Engrams
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
    maxConcurrentInstances: 20
  
  # Security configuration - IDENTICAL to Engrams
  security:
    runAsNonRoot: true
    requiredSecrets: ["github-webhook-secret"]
  
  # Container configuration
  with:
    webhook_path: "/webhooks/github"
    port: 8080

---
# StatefulSet Mode Impulse (Kafka consumer) - Same structure as Engrams
apiVersion: bubu.sh/v1alpha1
kind: Impulse
metadata:
  name: order-processor
spec:
  storyRef: "process-order"
  
  # Context mapping (Impulse-specific)
  mapping:
    order_id: "context.value.order_id"
    partition: "context.partition"
  
  # Engine configuration - IDENTICAL to Engrams
  engine:
    mode: "statefulset"
    templateRef: "kafka-consumer"
    workload:
      replicas: 3
      updateStrategy:
        type: "RollingUpdate"
        rollingUpdate:
          maxUnavailable: 1
      
      # StatefulSet configuration - IDENTICAL to Engrams
      statefulSet:
        serviceName: "kafka-consumer-svc"
        podManagementPolicy: "Parallel"          # Can start in parallel
        volumeClaimTemplates:
          - name: "offset-storage"
            size: "1Gi"
            accessModes: ["ReadWriteOnce"]
  
  # Resource configuration - IDENTICAL to Engrams
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  
  # Container configuration
  with:
    brokers: ["kafka-1:9092", "kafka-2:9092", "kafka-3:9092"]
    topic: "orders"
    group: "order-processors"

---
# Template showing supported modes validation
apiVersion: catalog.bubu.sh/v1alpha1
kind: EngramTemplate
metadata:
  name: http-client
spec:
  version: "1.0.0"
  description: "HTTP client - supports all modes"
  supportedModes: ["job", "deployment", "statefulset"]  # Engram supports all modes
  
  inputSchema:
    type: object
    required: ["url"]
    properties:
      url: {type: string}
      method: {type: string, enum: ["GET", "POST", "PUT", "DELETE"]}
  
  image: "ghcr.io/bubustack/http-client:v1.0.0"

---
# Template for Impulse (restricted modes)
apiVersion: catalog.bubu.sh/v1alpha1
kind: ImpulseTemplate  
metadata:
  name: webhook-impulse
spec:
  version: "1.0.0"
  description: "Webhook receiver"
  supportedModes: ["deployment"]                        # Impulse: only deployment (stateless)
  
  contextSchema:
    type: object
    properties:
      headers: {type: object}
      body: {type: object}
  
  image: "ghcr.io/bubustack/webhook-impulse:v1.0.0"

---
# Template for stateful Impulse
apiVersion: catalog.bubu.sh/v1alpha1
kind: ImpulseTemplate
metadata:
  name: kafka-consumer
spec:
  version: "1.0.0"
  description: "Kafka consumer with partition affinity"
  supportedModes: ["statefulset"]                       # Impulse: only statefulset (stateful)
  
  contextSchema:
    type: object
    properties:
      topic: {type: string}
      partition: {type: integer}
      value: {type: object}
  
  image: "ghcr.io/bubustack/kafka-consumer:v1.0.0"

---
# COMPARISON: What we removed (good defaults, rarely configured)
# revisionHistoryLimit: 10          # Kubernetes default is fine
# progressDeadlineSeconds: 600      # 10 minutes is reasonable default  
# suspend: false                    # Operational control, not config
# paused: false                     # Operational control, not config

# COMPARISON: What we kept (essential user configuration)
# replicas                          # Users need to control scaling
# parallelism/completions           # Users need to control job behavior
# updateStrategy                    # Users need to control rollout behavior
# backoffLimit                      # Users need to control retry behavior
# activeDeadlineSeconds             # Users need to control timeouts
# ttlSecondsAfterFinished          # Users need to control cleanup
# serviceName                       # Required for StatefulSet
# volumeClaimTemplates             # Users need to control storage

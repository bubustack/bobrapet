# Example storage configuration for BobRapet
# This ConfigMap tells BobRapet which existing Kubernetes storage to use

apiVersion: v1
kind: ConfigMap
metadata:
  name: bobrapet-storage-config
  namespace: bobrapet-system
data:
  # Storage class to use for artifacts (must support ReadWriteMany)
  # Examples: efs-sc, azurefile, gcp-filestore, nfs-client, etc.
  artifacts-storage-class: "efs-sc"
  
  # Access mode for cross-pod sharing (Required: ReadWriteMany)
  shared-access-mode: "ReadWriteMany"
  
  # Default storage size per namespace
  default-storage-size: "100Gi"
  
  # Retention policy (days)
  retention-days: "30"

---
# Example StorageClass configurations for different cloud providers

# AWS EFS (ReadWriteMany support)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-sc
provisioner: efs.csi.aws.com
parameters:
  provisioningMode: efs-ap
  fileSystemId: fs-0123456789abcdef0  # Replace with your EFS ID
  directoryPerms: "0755"
reclaimPolicy: Retain
volumeBindingMode: Immediate

---
# Azure Files (ReadWriteMany support)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: azurefile
provisioner: file.csi.azure.com
parameters:
  storageAccount: mystorageaccount  # Replace with your storage account
  shareName: bobrapet-share
  protocol: smb
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true

---
# Google Filestore (ReadWriteMany support)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: filestore-sc
provisioner: filestore.csi.storage.gke.io
parameters:
  tier: standard
  network: default
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true

---
# NFS Client Provisioner (for on-premises)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-client
provisioner: k8s-sigs.io/nfs-subdir-external-provisioner
parameters:
  server: nfs-server.example.com  # Replace with your NFS server
  path: /path/to/nfs/export       # Replace with your NFS path
  archiveOnDelete: "false"
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true

---
# Example: How BobRapet uses the storage
# PVCs will be automatically created per story (multiple per namespace):

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: user-registration-a1b2c3d4  # auto-generated: {story-name}-{hash}
  namespace: production
  labels:
    app.kubernetes.io/name: bobrapet
    app.kubernetes.io/component: story-storage
    bobrapet.bubu.sh/story: user-registration
spec:
  accessModes:
    - ReadWriteMany  # Critical for cross-pod access
  storageClassName: efs-sc  # From config
  resources:
    requests:
      storage: 100Gi  # From config

---
# Multiple stories in same namespace get separate storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: order-processing-e5f6g7h8  # Different story, different PVC
  namespace: production
  labels:
    app.kubernetes.io/name: bobrapet
    app.kubernetes.io/component: story-storage
    bobrapet.bubu.sh/story: order-processing
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc
  resources:
    requests:
      storage: 100Gi

---
# Directory structure inside the shared storage:
# /shared/
# ├── artifacts/
# │   └── {storyrun-name}/
# │       └── {step-name}/
# │           ├── input.json
# │           ├── output.json
# │           └── metadata.json
# ├── logs/
# │   └── {storyrun-name}/
# │       └── {step-name}.log
# └── history/
#     └── {date}/
#         ├── storyruns-{date}.json
#         └── stepruns-{date}.json

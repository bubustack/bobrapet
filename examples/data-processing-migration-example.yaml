# Data Processing Migration Example
# Shows how to migrate from deprecated setData/mergeData to Standard Engrams

---
# EXAMPLE 1: User Data Processing Pipeline
apiVersion: bubu.sh/v1alpha1
kind: Story
metadata:
  name: user-data-processing-example
spec:
  inputs:
    properties:
      user_id:
        type: text
        required: true
      include_preferences:
        type: boolean
        required: false
    
  steps:
    # Step 1: Fetch user data from database
    - name: get-user-profile
      ref: database-query-processor
      with:
        database:
          type: "postgresql"
          connection_string: "{{ .secrets.postgres_url }}"
        query: "SELECT id, name, email, created_at FROM users WHERE id = $1"
        parameters:
          - "{{ .inputs.user_id }}"
        post_process:
          format: "json"
          
    # Step 2: Conditionally fetch preferences
    - name: get-user-preferences
      type: condition
      if: ".inputs.include_preferences == true"
      then:
        - name: fetch-preferences
          ref: http-data-fetcher
          with:
            method: "GET"
            url: "https://api.preferences.com/user/{{ .inputs.user_id }}"
            headers:
              Authorization: "Bearer {{ .secrets.preferences_api_key }}"
            timeout: "10s"
            post_process:
              extract_path: "$.preferences"
              
    # Step 3: Combine user data (replaces old setData)
    - name: combine-user-data
      ref: data-combiner
      with:
        combine_fields:
          user_profile: "{{ .steps.get-user-profile.output }}"
          preferences: "{{ .steps.get-user-preferences.fetch-preferences.output }}"
          metadata:
            processed_at: "{{ now() }}"
            include_preferences: "{{ .inputs.include_preferences }}"
            
    # Step 4: Validate combined data
    - name: validate-user-data
      ref: data-validator
      with:
        input_data: "{{ .steps.combine-user-data.output }}"
        validations:
          schema_validation:
            enabled: true
            schema:
              type: "object"
              required: ["user_profile"]
              properties:
                user_profile:
                  type: "object"
                  required: ["id", "name", "email"]
        fail_on_error: true
        
    # Step 5: Transform for API response
    - name: format-response
      ref: json-processor
      with:
        input_data: "{{ .steps.combine-user-data.output }}"
        operations:
          - type: "transform"
            mapping:
              user_id: "user_profile.id"
              display_name: "user_profile.name"
              contact_email: "user_profile.email"
              account_created: "user_profile.created_at"
              settings: "preferences"
              last_updated: "metadata.processed_at"

---
# EXAMPLE 2: CSV Data Processing with Aggregation
apiVersion: bubu.sh/v1alpha1
kind: Story
metadata:
  name: csv-processing-example
spec:
  inputs:
    properties:
      csv_file_url:
        type: text
        required: true
      filter_date:
        type: text
        required: false
    
  steps:
    # Step 1: Process CSV file
    - name: load-csv-data
      ref: csv-processor
      with:
        input_csv: "{{ .inputs.csv_file_url }}"
        delimiter: ","
        has_header: true
        operations:
          - type: "validate"
            schema:
              columns:
                - name: "transaction_id"
                  type: "string"
                  required: true
                - name: "amount"
                  type: "number"
                  required: true
                - name: "date"
                  type: "date"
                  required: true
                - name: "category"
                  type: "string"
                  required: true
          - type: "clean"
            remove_duplicates: true
            trim_whitespace: true
          - type: "filter"
            conditions:
              - "amount > 0"
              - "date >= '{{ .inputs.filter_date | default \"2025-01-01\" }}'"
        output_format: "json"
        
    # Step 2: Aggregate by category
    - name: aggregate-by-category
      ref: array-processor
      with:
        input_array: "{{ .steps.load-csv-data.output.records }}"
        operations:
          sort_by: "category"
        aggregations:
          count: true
          sum: "amount"
          avg: "amount"
          min: "amount"
          max: "amount"
          
    # Step 3: Generate summary statistics
    - name: generate-summary
      ref: data-combiner
      with:
        combine_fields:
          total_transactions: "{{ .steps.load-csv-data.output.record_count }}"
          total_amount: "{{ .steps.aggregate-by-category.output.aggregations.sum }}"
          average_amount: "{{ .steps.aggregate-by-category.output.aggregations.avg }}"
          category_breakdown: "{{ .steps.aggregate-by-category.output }}"
          processed_at: "{{ now() }}"
          filter_applied: "{{ .inputs.filter_date }}"
          
    # Step 4: Format final report
    - name: format-report
      ref: json-processor
      with:
        input_data: "{{ .steps.generate-summary.output }}"
        operations:
          - type: "transform"
            mapping:
              report_id: "{{ 'REPORT_' + now() | format_time('20060102150405') }}"
              summary: 
                total_count: "total_transactions"
                total_value: "total_amount"
                average_value: "average_amount"
              categories: "category_breakdown"
              metadata:
                generated_at: "processed_at"
                data_filter: "filter_applied"

---
# EXAMPLE 3: Multi-Source Data Merge (replaces mergeData)
apiVersion: bubu.sh/v1alpha1
kind: Story
metadata:
  name: multi-source-merge-example
spec:
  inputs:
    properties:
      customer_id:
        type: text
        required: true
    
  steps:
    # Parallel data fetching
    - name: fetch-customer-data
      type: parallel
      branches:
        # Branch 1: Customer profile
        - name: get-customer-profile
          ref: database-query-processor
          with:
            database:
              type: "postgresql"
              connection_string: "{{ .secrets.postgres_url }}"
            query: "SELECT * FROM customers WHERE id = $1"
            parameters:
              - "{{ .inputs.customer_id }}"
              
        # Branch 2: Order history
        - name: get-order-history
          ref: database-query-processor
          with:
            database:
              type: "postgresql"
              connection_string: "{{ .secrets.postgres_url }}"
            query: |
              SELECT order_id, total_amount, order_date, status 
              FROM orders 
              WHERE customer_id = $1 
              ORDER BY order_date DESC 
              LIMIT 10
            parameters:
              - "{{ .inputs.customer_id }}"
              
        # Branch 3: Support tickets
        - name: get-support-tickets
          ref: http-data-fetcher
          with:
            method: "GET"
            url: "https://api.support.com/tickets"
            headers:
              Authorization: "Bearer {{ .secrets.support_api_key }}"
            query_params:
              customer_id: "{{ .inputs.customer_id }}"
              limit: "5"
              status: "all"
            post_process:
              extract_path: "$.tickets"
              
    # Merge all data sources (replaces old mergeData)
    - name: merge-customer-360
      ref: data-merger
      with:
        sources:
          - source: "profile"
            data: "{{ .steps.fetch-customer-data.get-customer-profile.output }}"
          - source: "orders"
            data: "{{ .steps.fetch-customer-data.get-order-history.output }}"
          - source: "support"
            data: "{{ .steps.fetch-customer-data.get-support-tickets.output }}"
        strategy: "deep_merge"
        conflict_resolution: "last_wins"
        
    # Calculate customer metrics
    - name: calculate-metrics
      ref: array-processor
      with:
        input_array: "{{ .steps.merge-customer-360.output.orders }}"
        aggregations:
          count: true
          sum: "total_amount"
          avg: "total_amount"
          
    # Generate final customer 360 view
    - name: generate-customer-360
      ref: data-combiner
      with:
        combine_fields:
          customer_info: "{{ .steps.merge-customer-360.output.profile }}"
          order_summary:
            total_orders: "{{ .steps.calculate-metrics.output.aggregations.count }}"
            total_spent: "{{ .steps.calculate-metrics.output.aggregations.sum }}"
            average_order: "{{ .steps.calculate-metrics.output.aggregations.avg }}"
            recent_orders: "{{ .steps.merge-customer-360.output.orders | take(5) }}"
          support_summary:
            recent_tickets: "{{ .steps.merge-customer-360.output.support | take(3) }}"
            ticket_count: "{{ .steps.merge-customer-360.output.support | length }}"
          generated_at: "{{ now() }}"

---
# Data Processing Engrams (included for completeness)
# In a real deployment, these would be in separate files

# Standard data-combiner Engram
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: data-combiner
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/data-combiner:v1.0.0
  with:
    operation: "combine"
    # Dynamically combine fields based on input configuration
    passthrough: true

# Standard data-merger Engram  
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: data-merger
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/data-merger:v1.0.0
  with:
    operation: "merge"
    # Merge multiple data sources with conflict resolution

# Standard json-processor Engram
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: json-processor
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/json-processor:v1.0.0
  with:
    operation: "process"
    # Advanced JSON processing and transformation

# Standard array-processor Engram
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: array-processor
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/array-processor:v1.0.0
  with:
    operation: "process"
    # Array processing with aggregations and transformations

# Standard csv-processor Engram
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: csv-processor
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/csv-processor:v1.0.0
  with:
    operation: "process"
    # CSV file processing and validation

# Standard http-data-fetcher Engram
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: http-data-fetcher
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/http-client:v1.0.0
  with:
    operation: "fetch_and_process"
    # HTTP data fetching with post-processing

# Standard database-query-processor Engram
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: database-query-processor
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/database-client:v1.0.0
  with:
    operation: "query_and_process"
    # Database querying with result processing

# Standard data-validator Engram
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: data-validator
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/data-validator:v1.0.0
  with:
    operation: "validate"
    # Data validation with schema and business rules

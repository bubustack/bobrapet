# Finance Tracker Workflow - Exact n8n clone
apiVersion: bubu.sh/v1alpha1
kind: Story
metadata:
  name: finance-tracker-workflow
spec:
  inputs:
    properties:
      action:
        type: text
        description: "Finance action: add or search"
        required: true
      data:
        type: json
        description: "Finance data or search parameters"
        required: true
    
  steps:
    - name: finance-agent
      ref: finance-tracker-agent
      with:
        action: "{{ .inputs.action }}"
        data: "{{ .inputs.data }}"
        current_date: "{{ now() }}"
        
    - name: execute-finance-action
      type: switch
      cases:
        - when: "finance-agent.output.action == 'add'"
          steps:
            - name: create-expense-entry
              ref: airtable-expense-creator
              with:
                expense: "{{ .finance-agent.output.expense }}"
                amount: "{{ .finance-agent.output.amount }}"
                category: "{{ .finance-agent.output.category }}"
                date: "{{ .finance-agent.output.date }}"
                
        - when: "finance-agent.output.action == 'search'"
          steps:
            - name: search-expenses
              ref: airtable-expense-searcher
              with:
                query: "{{ .finance-agent.output.search_query }}"

---
# Weather and News Workflow
apiVersion: bubu.sh/v1alpha1
kind: Story
metadata:
  name: weather-news-workflow
spec:
  inputs:
    properties:
      type:
        type: text
        description: "Type: weather or news"
        required: true
      query:
        type: text
        description: "Search query or location"
        required: true
      location:
        type: text
        description: "Location for weather"
        required: false
    
  steps:
    - name: weather-news-agent
      ref: weather-news-agent
      with:
        type: "{{ .inputs.type }}"
        query: "{{ .inputs.query }}"
        location: "{{ .inputs.location }}"
        
    - name: execute-request
      type: switch
      cases:
        - when: "inputs.type == 'weather'"
          steps:
            - name: get-weather
              ref: weather-api-tool
              with:
                location: "{{ .inputs.location | default .inputs.query }}"
                days: "{{ .weather-news-agent.output.forecast_days }}"
                
        - when: "inputs.type == 'news'"
          steps:
            - name: search-news
              ref: serp-news-tool
              with:
                query: "{{ .weather-news-agent.output.search_query }}"

---
# Calendar Management Workflow
apiVersion: bubu.sh/v1alpha1
kind: Story
metadata:
  name: calendar-management-workflow
spec:
  inputs:
    properties:
      action:
        type: text
        description: "Calendar action: create, get, update, delete, list"
        required: true
      parameters:
        type: json
        description: "Calendar parameters"
        required: true
    
  steps:
    - name: calendar-agent
      ref: calendar-agent
      with:
        action: "{{ .inputs.action }}"
        parameters: "{{ .inputs.parameters }}"
        current_date: "{{ now() }}"
        
    - name: execute-calendar-action
      type: switch
      cases:
        - when: "calendar-agent.output.action == 'create'"
          steps:
            - name: create-event
              ref: google-calendar-creator
              with:
                summary: "{{ .calendar-agent.output.summary }}"
                description: "{{ .calendar-agent.output.description }}"
                start_time: "{{ .calendar-agent.output.start_time }}"
                end_time: "{{ .calendar-agent.output.end_time }}"
                attendees: "{{ .calendar-agent.output.attendees }}"
                location: "{{ .calendar-agent.output.location }}"
                
        - when: "calendar-agent.output.action == 'list'"
          steps:
            - name: list-events
              ref: google-calendar-lister
              with:
                start_date: "{{ .calendar-agent.output.start_date }}"
                end_date: "{{ .calendar-agent.output.end_date }}"
                
        - when: "calendar-agent.output.action == 'get'"
          steps:
            - name: get-event
              ref: google-calendar-getter
              with:
                event_id: "{{ .calendar-agent.output.event_id }}"
                
        - when: "calendar-agent.output.action == 'update'"
          steps:
            - name: update-event
              ref: google-calendar-updater
              with:
                event_id: "{{ .calendar-agent.output.event_id }}"
                summary: "{{ .calendar-agent.output.summary }}"
                description: "{{ .calendar-agent.output.description }}"
                
        - when: "calendar-agent.output.action == 'delete'"
          steps:
            - name: delete-event
              ref: google-calendar-deleter
              with:
                event_id: "{{ .calendar-agent.output.event_id }}"

---
# Travel Planning Workflow
apiVersion: bubu.sh/v1alpha1
kind: Story
metadata:
  name: travel-planning-workflow
spec:
  inputs:
    properties:
      query:
        type: text
        description: "Travel query"
        required: true
    
  steps:
    - name: travel-agent
      ref: travel-agent
      with:
        query: "{{ .inputs.query }}"
        
    - name: search-travel-options
      type: parallel
      branches:
        - name: search-flights
          type: condition
          if: "travel-agent.output.need_flights"
          then:
            - name: get-flights
              ref: serp-flights-tool
              with:
                departure_id: "{{ .travel-agent.output.departure_airport }}"
                arrival_id: "{{ .travel-agent.output.arrival_airport }}"
                outbound_date: "{{ .travel-agent.output.departure_date }}"
                return_date: "{{ .travel-agent.output.return_date }}"
                adults: "{{ .travel-agent.output.adults }}"
                travel_class: "{{ .travel-agent.output.travel_class }}"
                
        - name: search-hotels
          type: condition
          if: "travel-agent.output.need_hotels"
          then:
            - name: get-hotels
              ref: serp-hotels-tool
              with:
                query: "{{ .travel-agent.output.hotel_query }}"
                check_in_date: "{{ .travel-agent.output.check_in }}"
                check_out_date: "{{ .travel-agent.output.check_out }}"
                adults: "{{ .travel-agent.output.adults }}"
                children: "{{ .travel-agent.output.children }}"
                rating: "{{ .travel-agent.output.min_rating }}"
                hotel_class: "{{ .travel-agent.output.hotel_class }}"

---
# Social Media Calendar Workflow
apiVersion: bubu.sh/v1alpha1
kind: Story
metadata:
  name: social-media-workflow
spec:
  inputs:
    properties:
      platform:
        type: text
        description: "Platform: instagram, linkedin, tiktok"
        required: true
      action:
        type: text
        description: "Action: get_ideas, choose_framework"
        required: true
    
  steps:
    - name: social-media-agent
      ref: social-media-calendar-agent
      with:
        platform: "{{ .inputs.platform }}"
        action: "{{ .inputs.action }}"
        
    - name: execute-social-action
      type: switch
      cases:
        - when: "social-media-agent.output.action == 'get_ideas'"
          steps:
            - name: get-content-ideas
              type: switch
              cases:
                - when: "inputs.platform == 'instagram'"
                  steps:
                    - name: get-instagram-ideas
                      ref: airtable-instagram-getter
                      with:
                        filter: "{{ .social-media-agent.output.filter }}"
                        
                - when: "inputs.platform == 'linkedin'"
                  steps:
                    - name: get-linkedin-ideas
                      ref: airtable-linkedin-getter
                      with:
                        filter: "{{ .social-media-agent.output.filter }}"
                        
                - when: "inputs.platform == 'tiktok'"
                  steps:
                    - name: get-tiktok-ideas
                      ref: airtable-tiktok-getter
                      with:
                        filter: "{{ .social-media-agent.output.filter }}"
                        
        - when: "social-media-agent.output.action == 'choose_framework'"
          steps:
            - name: update-content-choice
              type: switch
              cases:
                - when: "inputs.platform == 'instagram'"
                  steps:
                    - name: choose-instagram-framework
                      ref: airtable-instagram-updater
                      with:
                        url: "{{ .social-media-agent.output.content_url }}"
                        framework: "{{ .social-media-agent.output.selected_framework }}"
                        action: "{{ .social-media-agent.output.final_action }}"
                        
                - when: "inputs.platform == 'linkedin'"
                  steps:
                    - name: choose-linkedin-framework
                      ref: airtable-linkedin-updater
                      with:
                        url: "{{ .social-media-agent.output.content_url }}"
                        framework: "{{ .social-media-agent.output.selected_framework }}"
                        action: "{{ .social-media-agent.output.final_action }}"
                        
                - when: "inputs.platform == 'tiktok'"
                  steps:
                    - name: choose-tiktok-framework
                      ref: airtable-tiktok-updater
                      with:
                        url: "{{ .social-media-agent.output.content_url }}"
                        framework: "{{ .social-media-agent.output.selected_framework }}"
                        action: "{{ .social-media-agent.output.final_action }}"

---
# Core Engrams - The AI Components

# SINGLE ORCHESTRATOR AGENT - Exact n8n behavior  
# This agent has ALL tools connected (like n8n) instead of routing to separate workflows
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: single-orchestrator-agent
spec:
  engine:
    mode: deployment
    image: ghcr.io/bubustack/gpt4-agent:v1.0.0
    deployment:
      minReplicas: 1
      maxReplicas: 3
  with:
    model: "gpt-4.1"
    temperature: 0.1
    max_tokens: 2000
    
    # EXACT n8n system message
    system_message: |
      You are Shabbir Nooruddin's personal assistant. Your job is to make his life easier by being the source of information and execution for a large chunk of his daily tasks.

      The current time is {{ .inputs.current_time }}.

      These include:
      - News
      - Weather  
      - Travel information
      - Managing email
      - Creating blog posts
      - Keeping track of expenses
      - Personal Calendar
      - Checking the social media calendar

      WEATHER AND NEWS
      ----------------
      When asked about the weather or news, call the weather and news agent.

      For news, prioritize the most recent stories and just output the headline and a brief summary.

      For weather, only provide temperature, heat index or wind chill, and precipitation. Provide sunrise, sunset, moonrise, moonset if asked.

      TRAVEL INFORMATION
      -----------------
      Use the flights and hotel agent to find suitable flights or hotels for my query. Unless I specify otherwise, assume it's economy, one way, use the biggest airport in the city, and as few stops as possible.

      MANAGING EMAIL
      ---------------
      You have full access to all of my email and all functions. Assist me however I need. If I ask you to draft an email, confirm the draft with me before you send it. If I don't provide you with an email address, use the Contacts tool to find it, and confirm before sending. If you don't find it, ask me to provide it.

      MANAGING EXPENSES
      -----------------
      I will tell you to log or retrieve expenses. Use the finance tracker agent to add expenses or retrieve any information I request. Expense format to add: currency, amount, type - nothing else needed unless I specify.

      DEEP RESEARCH
      --------------
      I will ask you any question about anything. Use the deep research agent and retrieve information request. If I specify(don't ask), do deeper research.

      CALENDAR
      --------
      Use the Calendar Tool to help me keep track of meetings, book new ones, and manage existing ones. If I ask you to book a meeting with someone, try to find their info using the Contacts tool. If you're unable to find it, ask me for it.

      SOCIAL MEDIA CALENDAR
      ---------------
      Use the Social Media Calendar tool to retrieve Instagram, LinkedIn, and Tiktok content ideas and suggested frameworks. The Calendar tool must use its own Airtable search tools to find content ideas from MY EXISTING research database.

      I will either reject the idea or tell you which framework to choose - send that back to the social media calendar tool and it will take care of the rest. then get back to me with the confirmation you get from the social calendar tool.

      CONTENT WRITING
      --------------
      Use the create content tool to write blog posts. I will tell you a topic. Use the tool to write the content. The tool will return a fully formatted blog post, which you are to use the Google Docs tool to generate a new document and reply with the shareable URL.
    
    # User prompt from the workflow
    prompt: "{{ .inputs.prompt }}"
    
    # API configuration
    openai:
      api_key: "{{ .secrets.openai_key }}"
      organization: "{{ .secrets.openai_org }}"
    
    # Secrets configuration
    secrets:
      openai_key:
        source: "secret"
        name: "ai-api-keys"
        key: "openai_api_key"
      openai_org:
        source: "secret"
        name: "ai-api-keys"
        key: "openai_organization"
        optional: true

---
# Telegram File Downloader (n8n: "Download Audio")
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: telegram-file-downloader
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/telegram-client:v1.0.0
  with:
    operation: "download_file"
    file_id: "{{ .inputs.file_id }}"
    
    telegram:
      bot_token: "{{ .secrets.telegram_token }}"
    
    secrets:
      telegram_token:
        source: "secret"
        name: "telegram-bot-credentials"
        key: "bot_token"

---
# OpenAI Transcription Tool (n8n: "OpenAI" transcription)
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: openai-transcription-tool
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/openai-transcription:v1.0.0
  with:
    operation: "transcribe"
    audio_file: "{{ .inputs.audio_file }}"
    model: "whisper-1"
    
    openai:
      api_key: "{{ .secrets.openai_key }}"
    
    secrets:
      openai_key:
        source: "secret"
        name: "ai-api-keys"
        key: "openai_api_key"

---
# Data Combiner Engram (replaces setData)
# Like n8n "Combine fields" node
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: data-combiner-engram
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/data-combiner:v1.0.0
  with:
    operation: "combine"
    # Pass through all inputs as outputs
    passthrough: true
    
    # Data to combine
    prompt: "{{ .inputs.prompt }}"
    message_type: "{{ .inputs.message_type }}"

---
# Simple Response Engram (replaces setData for simple responses)
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: simple-response-engram
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/simple-response:v1.0.0
  with:
    operation: "response"
    response: "{{ .inputs.response }}"

---
# Memory Management Engram
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: conversation-context-manager
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/postgres-memory:v1.0.0
  with:
    database_url_secret: "postgres-connection"
    table: "conversation_history"
    max_context_length: 10
  security:
    requiredSecrets: ["postgres-connection"]
---
# Research Coordinator
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: research-coordinator-agent
spec:
  engine:
    mode: deployment
    image: ghcr.io/bubustack/gpt4-agent:v1.0.0
    deployment:
      minReplicas: 1
      maxReplicas: 3
  with:
    model: "gpt-4.1"
    system_message: |
      You are an expert research coordinator. Analyze the query and create optimized search queries for different research tools.
      Provide structured output with search strategies.
    temperature: 0.2
  security:
    requiredSecrets: ["openai-api-key"]
---
# Tool Engrams
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: tavily-research-tool
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/http-client:v1.0.0
  with:
    # HTTP configuration
    method: "POST"
    url: "https://api.tavily.com/search"
    headers:
      Content-Type: "application/json"
      Authorization: "Bearer {{ .secrets.tavily_key }}"
    
    # Request body template with input variables
    body_template: |
      {
        "query": "{{ .inputs.query }}",
        "search_depth": "{{ .inputs.search_depth | default \"basic\" }}",
        "max_results": {{ .inputs.max_results | default 3 }},
        "include_answer": true,
        "include_raw_content": true,
        "include_domains": [],
        "exclude_domains": []
      }
    
    # Error handling
    timeout: "30s"
    retry_attempts: 3
    
    # Secrets configuration
    secrets:
      tavily_key:
        source: "secret"
        name: "research-api-keys"
        key: "tavily_api_key"


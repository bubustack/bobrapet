# N8N Personal Assistant Workflow - EXACT Clone
# This is a 1:1 mapping of the n8n workflow structure to bobrapet

---
# MAIN WORKFLOW - Exact n8n flow structure
apiVersion: bubu.sh/v1alpha1
kind: Story
metadata:
  name: telegram-personal-assistant-workflow
  annotations:
    description: "Exact clone of n8n Personal Assistant workflow"
    n8n_workflow_id: "cgpXg8KmAEaVsnBH"
spec:
  inputs:
    properties:
      message:
        type: json
        description: "Telegram message object"
        required: true
    
  steps:
    # Step 1: Filter - Only allow specific chat ID (like n8n Filter node)
    - name: security-filter
      type: condition
      if: ".inputs.message.chat.id == 5675741296"
      then:
        # Step 2: Check Data Type - Text vs Voice (like n8n Switch node)
        - name: check-message-type
          type: switch
          cases:
            # Text message path
            - when: "inputs.message.text != null"
              steps:
                - name: combine-text-data
                  ref: data-combiner-engram
                  with:
                    prompt: "{{ .inputs.message.text }}"
                    message_type: "text"
                    
            # Voice message path  
            - when: "inputs.message.voice != null"
              steps:
                # Download voice file (like n8n Download Audio)
                - name: download-voice
                  ref: telegram-file-downloader
                  with:
                    file_id: "{{ .inputs.message.voice.file_id }}"
                    
                # Transcribe audio (like n8n OpenAI transcription)
                - name: transcribe-voice
                  ref: openai-transcription-tool
                  with:
                    audio_file: "{{ .download-voice.output.file_path }}"
                    
                - name: combine-voice-data
                  ref: data-combiner-engram
                  with:
                    prompt: "{{ .transcribe-voice.output.text }}"
                    message_type: "voice"
                    
        # Step 3: Single Orchestrator Agent (like n8n Orchestrator Agent)
        - name: orchestrator-agent
          ref: single-orchestrator-agent
          with:
            prompt: "{{ .combine-text-data.output.prompt || .combine-voice-data.output.prompt }}"
            message_type: "{{ .combine-text-data.output.message_type || .combine-voice-data.output.message_type }}"
            chat_id: "{{ .inputs.message.chat.id }}"
            user_id: "{{ .inputs.message.from.id }}"
            current_time: "{{ now() }}"
            
      else:
        - name: unauthorized
          ref: simple-response-engram
          with:
            response: "Unauthorized access"

---
# FALLBACK: Individual Domain Stories (for complex workflows)
apiVersion: bubu.sh/v1alpha1
kind: Story  
metadata:
  name: research-agent-workflow
spec:
  inputs:
    properties:
      query:
        type: text
        required: true
      depth:
        type: text
        required: false
    
  steps:
    - name: research-coordinator
      ref: research-coordinator-agent
      with:
        query: "{{ .inputs.query }}"
        depth: "{{ .inputs.depth }}"
        
    - name: parallel-research
      type: parallel
      branches:
        - name: tavily-search
          ref: tavily-research-tool
          with:
            query: "{{ .research-coordinator.output.search_query }}"
            max_results: 3
            
        - name: perplexity-search
          ref: perplexity-tool
          with:
            model: "sonar-pro"
            query: "{{ .research-coordinator.output.search_query }}"
            
    - name: deep-research
      type: condition
      if: ".inputs.depth == 'deep'"
      then:
        - name: deep-perplexity
          ref: perplexity-tool
          with:
            model: "sonar-deep-research"
            query: "{{ .research-coordinator.output.search_query }}"
            
    - name: synthesize-results
      ref: research-synthesizer
      with:
        tavily_results: "{{ .parallel-research.tavily-search.output }}"
        perplexity_results: "{{ .parallel-research.perplexity-search.output }}"
        deep_results: "{{ .deep-research.deep-perplexity.output }}"

---
# Research Agent Workflow - Equivalent to n8n's Research Agent subflow
apiVersion: bubu.sh/v1alpha1
kind: Story
metadata:
  name: research-agent-workflow
spec:
  inputs:
    properties:
      query:
        type: text
        description: "Research query"
        required: true
      depth:
        type: text
        description: "Research depth: basic or deep"
        required: false
    
  steps:
    - name: research-coordinator
      ref: research-coordinator-agent
      with:
        query: "{{ .inputs.query }}"
        depth: "{{ .inputs.depth }}"
        
    - name: parallel-research
      type: parallel
      branches:
        - name: tavily-search
          ref: tavily-research-tool
          with:
            query: "{{ .research-coordinator.output.search_query }}"
            max_results: 3
            
        - name: perplexity-search
          ref: perplexity-tool
          with:
            model: "sonar-pro"
            query: "{{ .research-coordinator.output.search_query }}"
            
    - name: deep-research
      type: condition
      if: ".inputs.depth == 'deep'"
      then:
        - name: deep-perplexity
          ref: perplexity-tool
          with:
            model: "sonar-deep-research"
            query: "{{ .research-coordinator.output.search_query }}"
            
    - name: synthesize-results
      ref: research-synthesizer
      with:
        tavily_results: "{{ .parallel-research.tavily-search.output }}"
        perplexity_results: "{{ .parallel-research.perplexity-search.output }}"
        deep_results: "{{ .deep-research.deep-perplexity.output }}"

---
# Email Management Workflow
apiVersion: bubu.sh/v1alpha1
kind: Story
metadata:
  name: email-management-workflow
spec:
  inputs:
    properties:
      action:
        type: text
        description: "Email action to perform"
        required: true
      parameters:
        type: json
        description: "Action parameters"
        required: true
    
  steps:
    - name: email-agent
      ref: email-management-agent
      with:
        action: "{{ .inputs.action }}"
        parameters: "{{ .inputs.parameters }}"
        
    - name: execute-email-action
      type: switch
      cases:
        - when: "email-agent.output.action == 'send'"
          steps:
            - name: send-email
              ref: gmail-send-tool
              with:
                to: "{{ .email-agent.output.to }}"
                subject: "{{ .email-agent.output.subject }}"
                message: "{{ .email-agent.output.message }}"
                
        - when: "email-agent.output.action == 'search'"
          steps:
            - name: search-emails
              ref: gmail-search-tool
              with:
                query: "{{ .email-agent.output.search_query }}"
                
        - when: "email-agent.output.action == 'reply'"
          steps:
            - name: reply-email
              ref: gmail-reply-tool
              with:
                message_id: "{{ .email-agent.output.message_id }}"
                reply: "{{ .email-agent.output.reply_content }}"

---
# Content Creation Workflow - Equivalent to Blog Post Writer
apiVersion: bubu.sh/v1alpha1
kind: Story
metadata:
  name: content-creation-workflow
spec:
  inputs:
    properties:
      type:
        type: text
        description: "Content type: blog, social, or document"
        required: true
      topic:
        type: text
        description: "Content topic"
        required: true
    
  steps:
    - name: content-planner
      ref: content-planning-agent
      with:
        type: "{{ .inputs.type }}"
        topic: "{{ .inputs.topic }}"
        
    - name: research-content
      type: executeStory
      storyRef: research-agent-workflow
      inputs:
        query: "{{ .content-planner.output.research_query }}"
        depth: "basic"
        
    - name: generate-structure
      ref: content-structure-tool
      with:
        topic: "{{ .inputs.topic }}"
        research: "{{ .research-content.output }}"
        
    - name: write-sections
      type: loop
      items: ".generate-structure.output.sections"
      body:
        - name: write-section
          ref: content-writer-tool
          with:
            section: "{{ .item }}"
            research: "{{ .research-content.output }}"
            
    - name: generate-image
      type: condition
      if: ".inputs.type == 'blog'"
      then:
        - name: create-image
          ref: image-generation-tool
          with:
            prompt: "{{ .content-planner.output.image_prompt }}"
            style: "professional"
            
    - name: compile-content
      ref: content-compiler
      with:
        sections: "{{ .write-sections.output }}"
        image_url: "{{ .generate-image.create-image.output.url }}"
        metadata: "{{ .content-planner.output.metadata }}"
        
    - name: publish-to-docs
      type: condition
      if: ".inputs.type == 'blog'"
      then:
        - name: create-google-doc
          ref: google-docs-creator
          with:
            title: "{{ .content-planner.output.title }}"
            content: "{{ .compile-content.output.html }}"


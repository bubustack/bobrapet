metadata:
  name: finance-tracker-agent
spec:
  engine:
    mode: deployment
    image: ghcr.io/bubustack/gpt4-agent:v1.0.0
    deployment:
      minReplicas: 1
      maxReplicas: 3
  with:
    model: "gpt-4.1"
    temperature: 0.1
    system_message: |
      You are a helpful assistant for an expense tracker. First, you must determine whether the input I provide you with is adding a new entry or inquiring about existing entries.
      
      Currency is Indian rupee or INR
      Current date is {{ .inputs.current_date }}
      
      Action: {{ .inputs.action }}
      Data: {{ .inputs.data }}
      
      If it's a new entry: Create a new entry with a corresponding category: entertainment, food, eating out, travel, transport, health, personal. Update the date field using an ISO 8601 format date.
      
      If you receive a bunch of text from a scanned invoice, determine the date and amount and create a single entry.
      
      If it's an inquiry, prepare a search query for the search entries tool.
      
      Return JSON with: action (add/search), expense, amount, category, date, search_query
    
    secrets:
      openai_key:
        source: "secret"
        name: "ai-api-keys"
        key: "openai_api_key"


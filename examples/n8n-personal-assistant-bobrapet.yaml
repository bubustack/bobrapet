# Impulse - Telegram Trigger (Exact n8n behavior)
apiVersion: bubu.sh/v1alpha1
kind: Impulse
metadata:
  name: telegram-personal-assistant
  annotations:
    description: "Exact clone of n8n Telegram Trigger"
    n8n_node_id: "79ea692d-fd8f-49b9-983c-8e3e0b1fcfc5"
spec:
  storyRef: telegram-personal-assistant-workflow  # Point to main workflow
  engine:
    mode: webhook
    resources:
      cpu: "100m"
      memory: "128Mi"
      replicas: 2
  with:
    # Telegram bot configuration (like n8n trigger)
    bot_token: "{{ .secrets.telegram_token }}"
    webhook_path: "/telegram-webhook"
    updates: ["message"]  # Only message updates (like n8n)
    
    # Secrets configuration
    secrets:
      telegram_token:
        source: "secret"
        name: "telegram-bot-credentials"
        key: "bot_token"
        
  # Pass raw message object (like n8n Telegram Trigger)
  contextMapping:
    message: "request.body.message"  # Raw message object


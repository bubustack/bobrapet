---
# Autocomplete Suggestions (n8n: "Autocomplete Suggestions") 
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: serp-autocomplete-tool
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/http-client:v1.0.0
  with:
    method: "GET"
    url: "https://serpapi.com/search.json"
    query_params:
      engine: "google_autocomplete"
      q: "{{ .inputs.keyword_as_searched_by_user }}"
      api_key: "{{ .secrets.serp_api_key }}"
    timeout: "10s"
    secrets:
      serp_api_key:
        source: "secret"
        name: "serp-api-credentials"
        key: "api_key"

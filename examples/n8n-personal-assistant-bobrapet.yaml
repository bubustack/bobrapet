    image: ghcr.io/bubustack/gpt4-agent:v1.0.0
    deployment:
      minReplicas: 1
      maxReplicas: 3
  with:
    model: "claude-sonnet-4"
    system_message: |
      Expert SEO content writer creating complete blog posts.
      Keyword: {{ .inputs.keyword }}
      Use tools for research, structure, writing, images.
    secrets:
      anthropic_key:
        source: "secret"
        name: "ai-api-keys"
        key: "anthropic_api_key"


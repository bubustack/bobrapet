# Rate-Limited API Engram with Pause Capability
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: openai-api-client
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/openai-client-smart:v1.0.0
  with:
    # Model configuration
    model: "{{ .inputs.model | default \"gpt-4.1\" }}"
    temperature: "{{ .inputs.temperature | default 0.7 }}"
    max_tokens: "{{ .inputs.max_tokens | default 2000 }}"
    
    # User prompt from inputs
    prompt: "{{ .inputs.prompt }}"
    system_message: "{{ .inputs.system_message }}"
    
    # Rate limiting with smart pause/resume
    rate_limit_handling: "pause_and_wait"  # Will pause execution if rate limited
    max_wait_time: "1h"
    retry_policy:
      max_retries: 3
      backoff: "exponential"
    
    # OpenAI API configuration
    openai:
      api_key: "{{ .secrets.openai_key }}"
      organization: "{{ .secrets.openai_org }}"
      base_url: "https://api.openai.com/v1"
    
    # Secrets configuration
    secrets:
      openai_key:
        source: "secret"
        name: "ai-api-keys"
        key: "openai_api_key"
      openai_org:
        source: "secret"
        name: "ai-api-keys"
        key: "openai_organization"
        optional: true


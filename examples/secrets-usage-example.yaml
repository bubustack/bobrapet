# Example demonstrating secrets support in Bobrapet expressions
# This shows how to use GitHub Actions-style secrets in Stories

---
# Create a secret with API credentials
apiVersion: v1
kind: Secret
metadata:
  name: api-credentials
  namespace: default
type: Opaque
data:
  API_KEY: YWJjZGVmZ2hpams=  # base64 encoded "abcdefghijk"
  API_URL: aHR0cHM6Ly9hcGkuZXhhbXBsZS5jb20=  # base64 encoded "https://api.example.com"

---
# Multi-key secret example
apiVersion: v1
kind: Secret
metadata:
  name: database-config
  namespace: default
type: Opaque
data:
  USERNAME: dXNlcg==  # base64 encoded "user"
  PASSWORD: cGFzcw==  # base64 encoded "pass"
  HOST: bG9jYWxob3N0  # base64 encoded "localhost"

---
# Story using secrets in expressions
apiVersion: bubu.sh/v1alpha1
kind: Story
metadata:
  name: api-workflow-with-secrets
  namespace: default
spec:
  steps:
    - name: fetch-data
      uses: engram-curl
      with:
        # Using single-key secret (returns the value directly)
        url: "${{ secrets.api-credentials.API_URL }}"
        headers:
          Authorization: "Bearer ${{ secrets.api-credentials.API_KEY }}"
        
    - name: process-data
      uses: engram-processor
      with:
        input_data: "${{ steps.fetch-data.outputs.data }}"
        
    - name: store-to-database
      uses: engram-database
      with:
        # Using multi-key secret with specific key access
        db_host: "${{ secrets.database-config.HOST }}"
        db_user: "${{ secrets.database-config.USERNAME }}"
        db_pass: "${{ secrets.database-config.PASSWORD }}"
        data: "${{ steps.process-data.outputs.processed }}"

---
# StoryRun to execute the workflow
apiVersion: runs.bubu.sh/v1alpha1
kind: StoryRun
metadata:
  name: api-workflow-run
  namespace: default
spec:
  storyRef: api-workflow-with-secrets
  inputs:
    batch_size: 100
    timeout: "30s"

# Standard Data Processing Engrams
# These replace deprecated setData/mergeData primitives with proper Engram-based data flow

---
# Data Combiner (replaces setData)
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: data-combiner
  annotations:
    description: "Combines input data into structured output - replaces setData primitive"
    category: "data-processing"
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/data-combiner:v1.0.0
  with:
    operation: "combine"
    # Pass through all inputs as structured output
    passthrough: true
    
    # Example: Combine specific fields
    combine_fields:
      user_id: "{{ .inputs.user_id }}"
      timestamp: "{{ now() }}"
      processed_data: "{{ .inputs.raw_data }}"
      
    # Output schema
    output_format: "json"

---
# Data Merger (replaces mergeData)
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: data-merger
  annotations:
    description: "Merges multiple data sources into one - replaces mergeData primitive"
    category: "data-processing"
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/data-merger:v1.0.0
  with:
    operation: "merge"
    
    # Sources to merge (from previous steps)
    sources:
      - source: "step1"
        data: "{{ .steps.step1.output }}"
      - source: "step2" 
        data: "{{ .steps.step2.output }}"
        
    # Merge strategy
    strategy: "deep_merge"  # shallow_merge|deep_merge|append|override
    conflict_resolution: "last_wins"  # first_wins|last_wins|error

---
# JSON Processor
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: json-processor
  annotations:
    description: "Advanced JSON data processing and transformation"
    category: "data-processing"
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/json-processor:v1.0.0
  with:
    operation: "process"
    
    # Input data
    input_data: "{{ .inputs.json_data }}"
    
    # Processing operations
    operations:
      - type: "sort"
        field: "{{ .inputs.sort_field }}"
        order: "{{ .inputs.sort_order | default 'asc' }}"
      - type: "filter"
        condition: "{{ .inputs.filter_condition }}"
      - type: "transform"
        mapping: "{{ .inputs.field_mapping }}"
      - type: "dedupe"
        key: "{{ .inputs.dedupe_key }}"

---
# Array Processor
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: array-processor
  annotations:
    description: "Array/list processing operations"
    category: "data-processing"
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/array-processor:v1.0.0
  with:
    operation: "process"
    
    # Input array
    input_array: "{{ .inputs.array_data }}"
    
    # Array operations
    operations:
      sort_by: "{{ .inputs.sort_field }}"
      filter_by: "{{ .inputs.filter_expression }}"
      map_fields: "{{ .inputs.field_mapping }}"
      limit: "{{ .inputs.limit | default 100 }}"
      offset: "{{ .inputs.offset | default 0 }}"
      
    # Aggregation operations
    aggregations:
      count: true
      sum: "{{ .inputs.sum_field }}"
      avg: "{{ .inputs.avg_field }}"
      min: "{{ .inputs.min_field }}"
      max: "{{ .inputs.max_field }}"

---
# CSV Processor  
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: csv-processor
  annotations:
    description: "CSV file processing and transformation"
    category: "data-processing"
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/csv-processor:v1.0.0
  with:
    operation: "process"
    
    # Input CSV (file path or data)
    input_csv: "{{ .inputs.csv_source }}"
    
    # CSV parsing options
    delimiter: "{{ .inputs.delimiter | default ',' }}"
    has_header: "{{ .inputs.has_header | default true }}"
    encoding: "{{ .inputs.encoding | default 'utf-8' }}"
    
    # Processing operations
    operations:
      - type: "validate"
        schema: "{{ .inputs.validation_schema }}"
      - type: "clean"
        remove_duplicates: true
        trim_whitespace: true
      - type: "transform"
        column_mapping: "{{ .inputs.column_mapping }}"
      - type: "filter"
        conditions: "{{ .inputs.filter_conditions }}"
        
    # Output format
    output_format: "json"  # json|csv|parquet

---
# HTTP Data Fetcher
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: http-data-fetcher
  annotations:
    description: "Fetch and process data from HTTP APIs"
    category: "data-processing"
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/http-client:v1.0.0
  with:
    operation: "fetch_and_process"
    
    # HTTP request configuration
    method: "{{ .inputs.method | default 'GET' }}"
    url: "{{ .inputs.url }}"
    headers: "{{ .inputs.headers }}"
    body: "{{ .inputs.body }}"
    timeout: "{{ .inputs.timeout | default '30s' }}"
    
    # Authentication
    auth:
      type: "{{ .inputs.auth_type }}"  # bearer|basic|api_key
      credentials: "{{ .secrets.api_credentials }}"
    
    # Data processing after fetch
    post_process:
      extract_path: "{{ .inputs.json_path }}"
      transform: "{{ .inputs.transform_expression }}"
      validate_schema: "{{ .inputs.response_schema }}"

---
# Database Query Processor
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: database-query-processor
  annotations:
    description: "Execute database queries and process results"
    category: "data-processing"
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/database-client:v1.0.0
  with:
    operation: "query_and_process"
    
    # Database connection
    database:
      type: "{{ .inputs.db_type }}"  # postgresql|mysql|mongodb|sqlite
      connection_string: "{{ .secrets.database_url }}"
      
    # Query configuration
    query: "{{ .inputs.sql_query }}"
    parameters: "{{ .inputs.query_params }}"
    
    # Result processing
    post_process:
      limit: "{{ .inputs.limit | default 1000 }}"
      format: "{{ .inputs.output_format | default 'json' }}"
      transform: "{{ .inputs.transform_expression }}"

---
# File Processor
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: file-processor
  annotations:
    description: "Process various file formats (JSON, XML, YAML, etc.)"
    category: "data-processing"
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/file-processor:v1.0.0
  with:
    operation: "process_file"
    
    # File input
    file_source: "{{ .inputs.file_path }}"  # Local path, URL, or S3 URI
    file_type: "{{ .inputs.file_type }}"    # json|xml|yaml|csv|xlsx|pdf
    
    # Processing options
    operations:
      - type: "parse"
        options: "{{ .inputs.parse_options }}"
      - type: "validate"
        schema: "{{ .inputs.validation_schema }}"
      - type: "transform"
        mapping: "{{ .inputs.field_mapping }}"
      - type: "filter"
        conditions: "{{ .inputs.filter_conditions }}"
        
    # Output configuration
    output_format: "{{ .inputs.output_format | default 'json' }}"
    output_destination: "{{ .inputs.output_path }}"

---
# Text Processor
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: text-processor
  annotations:
    description: "Advanced text processing and analysis"
    category: "data-processing"
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/text-processor:v1.0.0
  with:
    operation: "process_text"
    
    # Input text
    input_text: "{{ .inputs.text_data }}"
    
    # Text processing operations
    operations:
      - type: "clean"
        remove_html: true
        normalize_whitespace: true
        remove_special_chars: false
      - type: "tokenize"
        method: "{{ .inputs.tokenize_method | default 'word' }}"
      - type: "extract"
        patterns: "{{ .inputs.regex_patterns }}"
      - type: "sentiment"
        enabled: "{{ .inputs.analyze_sentiment | default false }}"
      - type: "entities"
        extract_entities: "{{ .inputs.extract_entities | default false }}"
        
    # Output format
    include_metadata: true
    include_statistics: true

---
# Data Validator
apiVersion: bubu.sh/v1alpha1
kind: Engram
metadata:
  name: data-validator
  annotations:
    description: "Validate data against schemas and business rules"
    category: "data-processing"
spec:
  engine:
    mode: job
    image: ghcr.io/bubustack/data-validator:v1.0.0
  with:
    operation: "validate"
    
    # Input data to validate
    input_data: "{{ .inputs.data_to_validate }}"
    
    # Validation configuration
    validations:
      schema_validation:
        enabled: true
        schema: "{{ .inputs.json_schema }}"
        strict: "{{ .inputs.strict_validation | default true }}"
      business_rules:
        enabled: "{{ .inputs.enable_business_rules | default false }}"
        rules: "{{ .inputs.business_rules }}"
      data_quality:
        check_completeness: true
        check_consistency: true
        check_accuracy: "{{ .inputs.accuracy_rules }}"
        
    # Validation behavior
    fail_on_error: "{{ .inputs.fail_on_validation_error | default true }}"
    include_details: true

{{- $imageTag := .Values.controllerManager.manager.image.tag | default "" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bobrapet.fullname" . }}-controller-manager
  labels:
    control-plane: controller-manager
  {{- include "bobrapet.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controllerManager.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: bobrapet
      control-plane: controller-manager
    {{- include "bobrapet.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bobrapet
        control-plane: controller-manager
      {{- include "bobrapet.selectorLabels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      containers:
      - args:
{{- range $arg := .Values.controllerManager.manager.args }}
{{- if eq $arg "--config-namespace=bobrapet-system" }}
        - --config-namespace={{ $.Release.Namespace }}
{{- else if eq $arg "--config-name=bobrapet-operator-config" }}
        - --config-name={{ include "bobrapet.fullname" $ }}-operator-config
{{- else }}
        - {{ $arg }}
{{- end }}
{{- end }}
        command:
        - /manager
        env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        image: {{ .Values.controllerManager.manager.image.repository }}:{{ if or (eq $imageTag "") (eq $imageTag "latest") }}{{ .Chart.AppVersion }}{{ else }}{{ $imageTag }}{{ end }}
        imagePullPolicy: {{ .Values.controllerManager.manager.imagePullPolicy }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources: {{- toYaml .Values.controllerManager.manager.resources | nindent 10
          }}
        securityContext: {{- toYaml .Values.controllerManager.manager.containerSecurityContext
          | nindent 10 }}
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: webhook-certs
          readOnly: true
      nodeSelector: {{- toYaml .Values.controllerManager.nodeSelector | nindent 8 }}
      securityContext: {{- toYaml .Values.controllerManager.podSecurityContext | nindent
        8 }}
      serviceAccountName: {{ include "bobrapet.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      tolerations: {{- toYaml .Values.controllerManager.tolerations | nindent 8 }}
      topologySpreadConstraints: {{- toYaml .Values.controllerManager.topologySpreadConstraints
        | nindent 8 }}
      volumes:
      - name: webhook-certs
        secret:
          secretName: {{ include "bobrapet.fullname" . }}-webhook-server-cert

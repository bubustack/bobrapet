apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bobrapet.fullname" . }}-controller-manager
  namespace: {{ include "bobrapet.namespace" . }}
  labels:
    control-plane: controller-manager
    {{- include "bobrapet.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      control-plane: controller-manager
      {{- include "bobrapet.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        control-plane: controller-manager
        {{- include "bobrapet.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{ toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "bobrapet.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          {{- $imageTag := .Values.image.tag | default .Chart.AppVersion }}
          image: "{{ .Values.image.repository }}:{{ $imageTag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- if .Values.manager.leaderElect }}
            - --leader-elect
            {{- end }}
            {{- if .Values.manager.leaderElectionID }}
            - --leader-election-id={{ .Values.manager.leaderElectionID }}
            {{- end }}
            {{- if .Values.manager.leaderElectionNamespace }}
            - --leader-election-namespace={{ .Values.manager.leaderElectionNamespace }}
            {{- end }}
            - --metrics-bind-address={{ .Values.manager.metricsBindAddress }}
            - --health-probe-bind-address={{ .Values.manager.healthProbeBindAddress }}
            - --config-namespace={{ include "bobrapet.effectiveConfigNamespace" . }}
            - --config-name={{ include "bobrapet.configName" . }}
            - --zap-log-level={{ .Values.manager.logLevel }}
            {{- range .Values.manager.extraArgs }}
            - {{ . | quote }}
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
            {{- end }}
          ports:
            {{- if .Values.webhook.enabled }}
            - containerPort: {{ .Values.webhook.targetPort }}
              name: webhook-server
              protocol: TCP
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - containerPort: {{ .Values.metrics.service.port }}
              name: https-metrics
              protocol: TCP
            {{- end }}
          {{- $managerEnv := .Values.manager.env }}
          {{- if or (not .Values.webhook.enabled) $managerEnv }}
          env:
            {{- if not .Values.webhook.enabled }}
            - name: ENABLE_WEBHOOKS
              value: "false"
            {{- end }}
            {{- with $managerEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.webhook.enabled }}
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
            {{- end }}
            {{- with .Values.manager.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      terminationGracePeriodSeconds: 10
      {{- if or .Values.webhook.enabled .Values.manager.volumes }}
      volumes:
        {{- if .Values.webhook.enabled }}
        - name: webhook-certs
          secret:
            secretName: {{ include "bobrapet.webhookCertSecretName" . }}
        {{- end }}
        {{- with .Values.manager.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

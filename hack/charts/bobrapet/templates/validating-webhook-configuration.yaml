    service:
      name: '{{ include "bobrapet.fullname" . }}-webhook-service'
      namespace: '{{ .Release.Namespace }}'
      path: /validate-transport-bubustack-io-v1alpha1-transport
  failurePolicy: Fail
  name: vtransport.kb.io
  rules:
  - apiGroups:
    - transport.bubustack.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - transports
  sideEffects: None

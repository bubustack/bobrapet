---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: bobrapet-dev-pool
  namespace: metallb-system
spec:
  addresses:
  - 172.18.255.200-172.18.255.250
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: bobrapet-dev-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
  - bobrapet-dev-pool
